<!-- PAGE: Auto EXP Management -->
<section class="page" id="page-admin-auto-exp" data-min-role="super_admin">
  <div class="page-header">
    <button class="back-btn" onclick="App.goBack()">←</button>
    <h2>自動 EXP 管理</h2>
  </div>
  <div style="padding:.5rem">
    <div class="info-card">
      <div class="info-title">自動積分規則</div>
      <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem">設定各項動作的自動積分值，0 表示不發放。可輸入負數扣分。</div>
      <div id="auto-exp-rules-list"></div>
      <button class="primary-btn full-width" style="margin-top:.6rem" onclick="App.saveAutoExpRules()">儲存設定</button>
    </div>
    <div class="info-card">
      <div class="info-title">歷史 EXP 回推補發</div>
      <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem">掃描所有歷史活動資料，補發從未發放的自動 EXP（僅補差額，不影響已發放紀錄）。</div>
      <div id="auto-exp-backfill-result" style="display:none;margin-bottom:.5rem"></div>
      <div style="display:flex;gap:.5rem">
        <button class="outline-btn" style="flex:1" onclick="App.runAutoExpBackfill(true)">預覽（不發放）</button>
        <button class="primary-btn" style="flex:1" id="auto-exp-backfill-execute-btn" onclick="App.runAutoExpBackfill(false)" disabled>確認補發</button>
      </div>
    </div>
    <div class="info-card">
      <div class="info-title">補發紀錄</div>
      <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem">顯示回推補發的 EXP 紀錄（最近 100 筆）。</div>
      <button class="outline-btn full-width" style="margin-bottom:.5rem" onclick="App._loadBackfillLogs()">載入補發紀錄</button>
      <div id="auto-exp-backfill-log-list" style="max-height:400px;overflow-y:auto"></div>
    </div>
    <div class="info-card">
      <div class="info-title">自動發放紀錄</div>
      <div id="auto-exp-log-list" style="max-height:400px;overflow-y:auto"></div>
    </div>
  </div>
</section>
