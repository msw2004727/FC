<meta name="robots" content="noindex, nofollow">
<!-- PAGE: Home -->
<section class="page active" id="page-home">
  <!-- Banner Carousel -->
  <div class="banner-carousel">
    <div class="banner-track" id="banner-track">
      <div class="banner-slide skeleton-slide">
        <div class="banner-skeleton skeleton"></div>
      </div>
    </div>
    <button class="banner-arrow banner-arrow-left" id="banner-prev" type="button" aria-hidden="true" tabindex="-1" hidden></button>
    <button class="banner-arrow banner-arrow-right" id="banner-next" type="button" aria-hidden="true" tabindex="-1" hidden></button>
    <div class="banner-dots" id="banner-dots"></div>
  </div>

  <div class="home-hero-actions" aria-label="首頁快速操作">
    <button class="home-watch-party-card is-hidden" type="button" onclick="App.openHomeWatchParty()" aria-label="查看觀賽聚會">
      <span class="home-watch-party-copy">一起找人看比賽</span>
    </button>
    <button class="primary-btn small home-create-event-btn" type="button" onclick="App.openHomeCreateEvent()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </svg>
      <span>我要開團</span>
    </button>
  </div>

  <!-- System Announcement Marquee -->
  <div class="announce-marquee-wrap" id="announce-marquee-wrap" style="display:none">
    <span class="announce-marquee-label">公告</span>
    <div class="announce-marquee-track" id="announce-marquee-track"></div>
  </div>

  <!-- Announcement Detail Modal -->
  <div class="modal-overlay" id="announce-detail-modal" onclick="if(event.target===this){this.classList.remove('open');this.querySelector('.modal').classList.remove('open')}">
    <div class="modal announcement-detail-modal">
      <div class="modal-header">
        <h3 id="ann-detail-title"></h3>
        <button class="modal-close" onclick="document.getElementById('announce-detail-modal').classList.remove('open');document.querySelector('#announce-detail-modal .modal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body" id="ann-detail-body"></div>
      <div id="ann-detail-footer" style="padding:.4rem 1.2rem .8rem;display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--text-muted)"></div>
    </div>
  </div>

  <!-- My Next Activity -->
  <section class="home-next-activity-section" id="home-next-activity" aria-live="polite"></section>

  <!-- Sport Quick Entry -->
  <section class="home-dashboard-section" aria-labelledby="home-sport-entry-title">
    <div class="home-dashboard-title-row">
      <h3 id="home-sport-entry-title">運動快速入口</h3>
      <span class="home-stat-views home-sport-views" id="home-sport-views" title="瀏覽統計" aria-live="polite"></span>
    </div>
    <div class="home-sport-entry" id="home-sport-entry" aria-live="polite"></div>
  </section>

  <!-- Current Info Meter -->
  <section class="home-dashboard-section home-info-dashboard-section" aria-labelledby="home-info-title">
    <div class="home-dashboard-title-row home-info-title-row">
      <h3 id="home-info-title">目前資訊</h3>
    </div>
    <div class="home-info-meter" id="home-info-meter" aria-live="polite"></div>
  </section>

  <hr class="home-divider" style="display:none">
  <!-- Game Shortcut -->
  <div class="home-heading" style="display:none"><h3>小遊戲</h3><div class="home-heading-accent"></div></div>
  <button class="home-game-card" id="home-game-card-shot" onclick="App.showPage('page-game')" type="button" aria-label="蓄力射門 誰與爭鋒" style="display:none">
    <div class="home-game-card-icon" aria-hidden="true">⚽</div>
    <div class="home-game-card-info">
      <div class="home-game-card-title">蓄力射門 誰與爭鋒</div>
      <div class="home-game-card-sub">挑戰移動九宮格、登上榮耀射手榜!!</div>
    </div>
    <svg class="home-game-card-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <button class="home-game-card" id="home-game-card-kick" onclick="App.showPage('page-kick-game')" type="button" aria-label="誰才是開球王" style="display:none">
    <div class="home-game-card-icon" aria-hidden="true">⚽</div>
    <div class="home-game-card-info">
      <div class="home-game-card-title">誰才是開球王</div>
      <div class="home-game-card-sub">蓄力開球、挑戰最遠距離，登上開球榜!</div>
    </div>
    <svg class="home-game-card-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
  </button>

  <hr class="home-divider" id="sponsor-divider">
  <!-- Sponsors -->
  <div class="sponsor-grid" id="sponsor-grid"></div>

  <hr class="home-divider" id="news-divider" style="display:none">
  <!-- Sports News -->
  <div class="home-heading" id="news-section-title" style="display:none">
    <h3>每日體育新聞</h3>
    <div class="home-heading-accent"></div>
  </div>
  <div class="news-tabs" id="news-tabs" style="display:none"></div>
  <div class="news-card-list" id="news-card-list"></div>

  <!-- Floating Ads -->
  <div class="floating-ads" id="floating-ads"></div>

</section>
