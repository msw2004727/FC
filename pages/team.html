<meta name="robots" content="noindex, nofollow">
    <!-- PAGE: Teams -->
    <section class="page" id="page-teams">
      <div class="page-header">
        <h2>俱樂部</h2>
        <button
          class="primary-btn small"
          id="team-page-create-btn"
          onclick="App.openTeamCreateFromTeamsPage()"
          style="display:none"
        >新增俱樂部</button>
      </div>
      <div class="team-search-bar">
        <input type="text" id="team-search" placeholder="搜尋俱樂部名稱..." oninput="App.filterTeams()">
        <select id="team-sport-filter" onchange="App.filterTeams()">
          <option value="">全部運動</option>
        </select>
        <select id="team-region-filter" onchange="App.filterTeams()">
          <option value="">全部地區</option>
          <!-- 2026-04-25：順序統一為 6 都優先（與表單 picker 一致） -->
          <option value="台北市">台北市</option>
          <option value="新北市">新北市</option>
          <option value="桃園市">桃園市</option>
          <option value="台中市">台中市</option>
          <option value="台南市">台南市</option>
          <option value="高雄市">高雄市</option>
          <option value="基隆市">基隆市</option>
          <option value="新竹市">新竹市</option>
          <option value="嘉義市">嘉義市</option>
          <option value="新竹縣">新竹縣</option>
          <option value="苗栗縣">苗栗縣</option>
          <option value="彰化縣">彰化縣</option>
          <option value="南投縣">南投縣</option>
          <option value="雲林縣">雲林縣</option>
          <option value="嘉義縣">嘉義縣</option>
          <option value="屏東縣">屏東縣</option>
          <option value="宜蘭縣">宜蘭縣</option>
          <option value="花蓮縣">花蓮縣</option>
          <option value="台東縣">台東縣</option>
          <option value="澎湖縣">澎湖縣</option>
          <option value="金門縣">金門縣</option>
          <option value="連江縣">連江縣</option>
        </select>
      </div>
      <div class="team-type-tabs" id="team-type-tabs">
        <button class="team-type-tab active" data-type="" onclick="App.switchTeamTypeTab('')">
          <svg class="team-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>全部</span>
        </button>
        <button class="team-type-tab" data-type="general" onclick="App.switchTeamTypeTab('general')">
          <svg class="team-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/><path d="m9 3.6 3 7.4 3-7.4"/><path d="m9 20.4 3-7.4 3 7.4"/></svg>
          <span>運動</span>
        </button>
        <button class="team-type-tab" data-type="education" onclick="App.switchTeamTypeTab('education')">
          <svg class="team-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>教學</span>
        </button>
      </div>
      <div class="team-grid" id="team-list">
        <div class="skeleton skeleton-team-card"></div>
        <div class="skeleton skeleton-team-card"></div>
      </div>
    </section>

    <!-- PAGE: Team Detail -->
    <section class="page" id="page-team-detail">
      <div class="page-header">
        <button class="back-btn" onclick="App.goBack()">←</button>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:.1rem">
          <h2 id="team-detail-title" style="margin:0;line-height:1.2">俱樂部名稱</h2>
          <span id="team-detail-name-en" style="font-size:.75rem;color:var(--text-muted);line-height:1.2"></span>
        </div>
        <button
          class="primary-btn small"
          id="team-detail-edit-btn"
          onclick="App.openTeamDetailEdit()"
          style="display:none;flex-shrink:0"
        >編輯俱樂部</button>
      </div>
      <div class="td-img-placeholder" id="team-detail-img">俱樂部封面 800 × 300</div>
      <div class="detail-body" id="team-detail-body"></div>
    </section>

    <!-- PAGE: Team Manage (Captain+) -->
    <section class="page" id="page-team-manage" data-min-role="captain">
      <div class="page-header">
        <button class="back-btn" onclick="App.goBack()">←</button>
        <h2>俱樂部管理</h2>
        <button class="primary-btn small" id="team-manage-create-btn" onclick="App._showTeamTypeSelect()">＋ 新增俱樂部</button>
      </div>
      <div class="card-list" id="team-manage-list"></div>
    </section>

  <!-- Team Type Selection Modal -->
  <div class="modal" id="team-type-select-modal">
    <div class="modal-header">
      <h3>選擇俱樂部類型</h3>
      <button class="modal-close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="team-type-select-grid">
        <div class="team-type-select-card" onclick="App._selectTeamCreateType('general')">
          <div class="team-type-select-icon">⚽</div>
          <div class="team-type-select-title">運動俱樂部</div>
          <div class="team-type-select-desc">組建競技團隊，管理成員、賽事與戰績</div>
        </div>
        <div class="team-type-select-card" onclick="App._selectTeamCreateType('education')">
          <div class="team-type-select-icon">📚</div>
          <div class="team-type-select-title">教學俱樂部</div>
          <div class="team-type-select-desc">開設課程教學，管理學員報名與課程排程</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Team Modal -->
  <div class="modal" id="create-team-modal" data-no-backdrop-close="1">
    <div class="modal-header">
      <h3 id="ct-team-modal-title">新增俱樂部</h3>
      <button class="modal-close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ce-form">
        <div class="ce-row">
          <label>俱樂部封面</label>
          <div class="ce-upload-placeholder" id="ct-team-preview" onclick="document.getElementById('ct-team-image').click()">
            <span class="ce-upload-icon">+</span>
            <span class="ce-upload-text">點擊上傳封面圖片</span>
            <span class="ce-upload-hint">建議尺寸 800 × 300 px｜JPG / PNG｜最大 2MB</span>
          </div>
          <input type="file" id="ct-team-image" accept=".jpg,.jpeg,.png" hidden>
        </div>
        <input type="hidden" id="ct-team-type" value="general">
        <div class="ce-row" id="ct-team-type-display" style="display:none">
          <label>俱樂部類型</label>
          <div id="ct-team-type-label" style="font-size:.85rem;font-weight:600;color:var(--accent);padding:.3rem 0"></div>
        </div>
        <div id="ct-edu-settings" class="ce-row" style="display:none">
          <label>學員招募狀態</label>
          <div class="ct-edu-toggle-wrap">
            <div class="ct-edu-toggle-row">
              <span class="ct-edu-toggle-label">接受新學員報名</span>
              <label class="toggle-switch" style="margin:0;transform:scale(.85)">
                <input type="checkbox" id="ct-edu-accepting" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="ct-edu-toggle-hint">開啟後新學員可透過俱樂部頁面申請加入，關閉後將暫停招收新學員，已報名學員不受影響。</div>
          </div>
        </div>
        <div class="ce-row">
          <label>運動類型 <span class="required">*必填</span></label>
          <select id="ct-team-sport-tag" style="width:100%;padding:.45rem .6rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;background:var(--surface);color:var(--text-primary)">
            <option value="">未指定</option>
          </select>
        </div>
        <div class="ce-row">
          <label>俱樂部名稱（最多 15 字） <span class="required">*必填</span></label>
          <input type="text" id="ct-team-name" maxlength="15" placeholder="例：雷霆隊">
        </div>
        <div class="ce-row">
          <label>英文名稱</label>
          <input type="text" id="ct-team-name-en" placeholder="例：Thunder FC">
        </div>
        <div class="ce-row" style="display:flex;gap:.5rem">
          <div style="flex:1">
            <label>國籍</label>
            <input type="text" id="ct-team-nationality" maxlength="20" placeholder="例：台灣" value="台灣">
          </div>
          <div style="flex:1;position:relative">
            <label>地區 <span class="required">*必填</span></label>
            <input type="text" id="ct-team-region" maxlength="20" placeholder="輸入或選擇縣市" autocomplete="off"
                   oninput="App._onTeamRegionInput()" onfocus="App._onTeamRegionFocus()" onblur="App._onTeamRegionBlur()">
            <div id="ct-team-region-suggest" class="team-user-suggest"></div>
          </div>
        </div>
        <div class="ce-row">
          <label>創立年份</label>
          <input type="number" id="ct-team-founded" min="1900" max="2099" placeholder="例：2024">
        </div>
        <div class="ce-row" id="ct-captain-row" style="position:relative">
          <label>俱樂部經理 <span class="required">*必填</span></label>
          <div id="ct-captain-display" style="font-size:.85rem;font-weight:600;color:var(--text-primary);padding:.3rem 0"></div>
          <div id="ct-captain-transfer" style="display:none">
            <div class="ct-captain-hint" style="font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem">搜尋俱樂部經理：輸入暱稱或 UID 後點選</div>
            <input type="text" id="ct-captain-search" placeholder="搜尋 UID 或暱稱..." oninput="App.searchTeamCaptain()" autocomplete="off">
            <div class="team-user-suggest" id="ct-captain-suggest"></div>
            <div id="ct-captain-selected"></div>
          </div>
          <div id="ct-captain-locked" style="display:none;font-size:.8rem;color:var(--text-muted);padding:.3rem 0">（僅俱樂部經理或管理員可轉移經理職位）</div>
        </div>
        <div class="ce-row" id="ct-leader-row" style="position:relative">
          <label>俱樂部領隊 <span class="required">*必填</span></label>
          <div id="ct-leaders-tags" style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem"></div>
          <div id="ct-leader-add-section">
            <div class="ct-leader-hint" style="font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem">搜尋俱樂部領隊：輸入暱稱後點選加入（可複數）</div>
            <input type="text" id="ct-leader-search" placeholder="搜尋 UID 或暱稱..." oninput="App.searchTeamLeader()" autocomplete="off">
            <div class="team-user-suggest" id="ct-leader-suggest"></div>
          </div>
        </div>
        <div class="ce-row">
          <label>聯繫方式</label>
          <input type="text" id="ct-team-contact" maxlength="100" placeholder="例：LINE ID、電話、Email">
        </div>
        <div class="ce-row" style="position:relative">
          <label>教練（可多位）</label>
          <input type="text" id="ct-coach-search" placeholder="搜尋 UID 或暱稱..." oninput="App.searchTeamCoach()" autocomplete="off">
          <div class="team-user-suggest" id="ct-coach-suggest"></div>
          <div id="ct-coach-tags"></div>
        </div>
        <div class="ce-row">
          <label>俱樂部簡介</label>
          <textarea id="ct-team-bio" maxlength="500" rows="3" placeholder="簡短介紹俱樂部（最多 500 字）"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="outline-btn" onclick="App.closeModal()">取消</button>
      <button class="primary-btn" id="ct-team-save-btn" onclick="App.handleSaveTeam()">建立俱樂部</button>
    </div>
  </div>
