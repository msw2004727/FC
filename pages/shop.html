<meta name="robots" content="noindex, nofollow">
    <!-- PAGE: Second Hand Shop -->
    <section class="page" id="page-shop">
      <div class="page-header">
        <button class="back-btn" onclick="App.goBack()" aria-label="返回" data-i18n-aria-label="返回"><svg class="back-btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h2 data-i18n="二手商品區">二手商品區</h2>
      </div>
      <div class="filter-bar visible">
        <select><option data-i18n="全部分類">全部分類</option><option data-i18n="球鞋">球鞋</option><option data-i18n="球衣">球衣</option><option data-i18n="護具">護具</option></select>
        <select><option data-i18n="全部價格">全部價格</option><option>$0~500</option><option>$500~1500</option><option>$1500+</option></select>
        <select><option data-i18n="最新上架">最新上架</option><option data-i18n="最舊上架">最舊上架</option></select>
      </div>
      <div class="shop-grid" id="shop-grid"></div>
    </section>

    <!-- PAGE: Shop Detail -->
    <section class="page" id="page-shop-detail">
      <div class="page-header">
        <button class="back-btn" onclick="App.goBack()" aria-label="返回" data-i18n-aria-label="返回"><svg class="back-btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h2 id="shop-detail-title" data-i18n="商品名稱">商品名稱</h2>
      </div>
      <div class="detail-body" id="shop-detail-body"></div>
    </section>

    <!-- PAGE: Leaderboard -->
    <section class="page" id="page-leaderboard">
      <div class="page-header">
        <button class="back-btn" onclick="App.goBack()" aria-label="返回" data-i18n-aria-label="返回"><svg class="back-btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h2 data-i18n="排行榜">排行榜</h2>
      </div>
      <div class="tab-bar compact">
        <button class="tab active" data-i18n="週">週</button>
        <button class="tab" data-i18n="雙週">雙週</button>
        <button class="tab" data-i18n="月">月</button>
        <button class="tab" data-i18n="季">季</button>
        <button class="tab" data-i18n="年">年</button>
      </div>
      <div class="leaderboard-list" id="leaderboard-list"></div>
    </section>

  <!-- Create Shop Item Modal -->
  <div class="modal" id="create-shop-modal">
    <div class="modal-header">
      <h3 data-i18n="新增二手商品">新增二手商品</h3>
      <button class="modal-close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ce-form">
        <div class="ce-row">
          <label data-i18n="商品圖片（最多 3 張）">商品圖片（最多 3 張）</label>
          <div class="cs-img-row">
            <div class="cs-img-upload">
              <input type="file" id="cs-img1" accept=".jpg,.jpeg,.png" hidden>
              <div class="ce-upload-placeholder cs-preview" id="cs-preview1" onclick="document.getElementById('cs-img1').click()">
                <span class="ce-upload-icon">+</span>
                <span class="ce-upload-hint">JPG/PNG 2MB</span>
              </div>
            </div>
            <div class="cs-img-upload">
              <input type="file" id="cs-img2" accept=".jpg,.jpeg,.png" hidden>
              <div class="ce-upload-placeholder cs-preview" id="cs-preview2" onclick="document.getElementById('cs-img2').click()">
                <span class="ce-upload-icon">+</span>
                <span class="ce-upload-hint">JPG/PNG 2MB</span>
              </div>
            </div>
            <div class="cs-img-upload">
              <input type="file" id="cs-img3" accept=".jpg,.jpeg,.png" hidden>
              <div class="ce-upload-placeholder cs-preview" id="cs-preview3" onclick="document.getElementById('cs-img3').click()">
                <span class="ce-upload-icon">+</span>
                <span class="ce-upload-hint">JPG/PNG 2MB</span>
              </div>
            </div>
          </div>
          <span class="ce-upload-hint" style="margin-top:.2rem" data-i18n="建議尺寸 400 × 300 px｜JPG / PNG｜每張最大 2MB">建議尺寸 400 × 300 px｜JPG / PNG｜每張最大 2MB</span>
        </div>
        <div class="ce-row">
          <label>商品名稱 <span class="required" data-i18n="*必填">*必填</span></label>
          <input type="text" id="cs-name" placeholder="例：Nike Phantom GT2" maxlength="20" data-i18n-placeholder="例：Nike Phantom GT2">
        </div>
        <div class="ce-row ce-row-half">
          <div>
            <label data-i18n="新舊程度">新舊程度</label>
            <select id="cs-condition">
              <option value="全新" data-i18n="全新">全新</option>
              <option value="9成新" selected data-i18n="9成新">9成新</option>
              <option value="8成新" data-i18n="8成新">8成新</option>
              <option value="7成新" data-i18n="7成新">7成新</option>
              <option value="6成新以下" data-i18n="6成新以下">6成新以下</option>
            </select>
          </div>
          <div>
            <label>價格 (NT$) <span class="required" data-i18n="*必填">*必填</span></label>
            <input type="number" id="cs-price" placeholder="0" max="999999">
          </div>
        </div>
        <div class="ce-row">
          <label data-i18n="尺寸 / 規格">尺寸 / 規格</label>
          <input type="text" id="cs-size" placeholder="例：US10、L、M" data-i18n-placeholder="例：US10、L、M">
        </div>
        <div class="ce-row">
          <label data-i18n="商品描述（上限 500 字）">商品描述（上限 500 字）</label>
          <textarea id="cs-desc" rows="4" maxlength="500" placeholder="描述商品狀況、使用次數、附贈配件等..." data-i18n-placeholder="描述商品狀況、使用次數、附贈配件等..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="outline-btn" onclick="App.closeModal()" data-i18n="取消">取消</button>
      <button class="primary-btn" onclick="App.handleSaveShopItem()" data-i18n="上架商品">上架商品</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="App.closeLightbox()">
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-close">✕</button>
  </div>
