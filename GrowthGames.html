<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthGames — 養成角色互動</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh; }
  [data-theme="dark"] body { background: #111; color: #eee; }
  h2 { font-size: .9rem; margin-bottom: .5rem; }
  .toolbar { display: flex; gap: .4rem; margin-bottom: .8rem; flex-wrap: wrap; justify-content: center; max-width: 580px; }
  .toolbar button { font-size: .65rem; padding: .25rem .5rem; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; white-space: nowrap; }
  [data-theme="dark"] .toolbar button { background: #222; border-color: #444; color: #eee; }
  .toolbar button:hover { background: #e0e0e0; }
  [data-theme="dark"] .toolbar button:hover { background: #333; }
  .toolbar button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .toolbar .skin-btn { border-color: #f59e0b; }
  .toolbar .skin-btn.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }
  .canvas-wrap { width: 100%; max-width: 560px; height: 127px; border-radius: 8px; overflow: visible; position: relative; }
</style>
<script>
// ── 快取清除（?clear=1）+ 版本自動更新 ──
(function(){
  var V='20260322x';
  if(location.search.indexOf('clear=1')!==-1){
    if('caches' in window) caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
    if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(w){w.unregister()})});
    localStorage.setItem('gg_cache_ver',V);
    location.replace(location.pathname);
    return;
  }
  var prev=localStorage.getItem('gg_cache_ver');
  if(prev&&prev!==V){
    if('caches' in window) caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
    if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(w){w.unregister()})});
  }
  localStorage.setItem('gg_cache_ver',V);
})();
</script>
</head>
<body>

<h2>GrowthGames — 養成角色互動</h2>

<div class="toolbar" id="toolbar-top">
  <button onclick="toggleTheme()">主題</button>
</div>

<div class="canvas-wrap" id="scene-container"></div>

<div class="toolbar" id="toolbar-bottom" style="margin-top:.8rem;"></div>
<div class="toolbar" id="toolbar-enemy" style="margin-top:.4rem;"></div>

<!-- 載入模組 -->
<script src="js/modules/color-cat/color-cat-config.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-stats.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-sprite.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-ball.js?v=20260322x"></script>
<script src="js/modules/color-cat/dialogue/color-cat-dialogue-data.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-stamina.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-particles.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-actions.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-actions-interact.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-actions-special.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-combat.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-combo.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-ai.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-character-bubble.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-profile.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-bg.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-box.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-flag.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-flower.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-butterfly.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-panel.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-panel-tab0.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-panel-tab1.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-panel-tab2.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-enemy.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-enemy-util.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-enemy-draw.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-enemy-projectile.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-damage-number.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-fog.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-grave.js?v=20260322x"></script>
<script src="js/modules/color-cat/color-cat-scene-stats-modal.js?v=20260322x"></script>

<script>
// ── 主題：讀取主站 localStorage 同步 ──
(function syncTheme() {
  var saved = localStorage.getItem('sporthub_theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  }
})();
function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme');
  var next = t === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sporthub_theme', next);
}

// ── 建立工具列按鈕 ──
(function buildTestToolbar() {
  var top = document.getElementById('toolbar-top');
  var bot = document.getElementById('toolbar-bottom');
  var C = window.ColorCatConfig;

  // ── 上方：角色皮膚 + 長花 ──
  var skinKeys = Object.keys(C.SKINS);
  skinKeys.forEach(function(sk) {
    var btn = document.createElement('button');
    btn.textContent = C.SKINS[sk].name;
    btn.id = 'skin-' + sk;
    btn.className = 'skin-btn' + (sk === ColorCatCharacter.getSkin() ? ' active' : '');
    btn.onclick = function() {
      ColorCatCharacter.switchSkin(sk);
      document.querySelectorAll('.skin-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    };
    top.appendChild(btn);
  });

  var sep = document.createElement('span');
  sep.textContent = '｜';
  sep.style.cssText = 'font-size:.7rem;color:#999;align-self:center;';
  top.appendChild(sep);

  var flowerBtn = document.createElement('button');
  flowerBtn.textContent = '長花';
  flowerBtn.style.borderColor = '#5DA849';
  flowerBtn.onclick = function() { ColorCatScene.addFlower(); };
  top.appendChild(flowerBtn);

  var fogBtn = document.createElement('button');
  fogBtn.textContent = '濃霧';
  fogBtn.style.borderColor = '#64748b';
  fogBtn.onclick = function() {
    var s_ = window.ColorCatScene && window.ColorCatScene._;
    if (s_ && s_.toggleFog) { s_.toggleFog(); fogBtn.classList.toggle('active'); }
  };
  top.appendChild(fogBtn);

  // ── 下方：動作 + 爬牆 + 爬紙箱 + 咬球 + 虛弱 ──
  var actions = Object.keys(C.ACTION_DEFS);
  actions.forEach(function(key) {
    var btn = document.createElement('button');
    btn.textContent = C.ACTION_DEFS[key].label;
    btn.id = 'btn-' + key;
    btn.onclick = function() {
      var old = bot.querySelector('button.active:not(.weak-btn)');
      if (old) old.classList.remove('active');
      if (ColorCatCharacter.getTestMode() === key) {
        ColorCatCharacter.stopTest();
      } else {
        ColorCatCharacter.testAction(key);
        btn.classList.add('active');
      }
    };
    bot.appendChild(btn);
  });

  var sep2 = document.createElement('span');
  sep2.textContent = '｜';
  sep2.style.cssText = 'font-size:.7rem;color:#999;align-self:center;';
  bot.appendChild(sep2);

  var wallBtn = document.createElement('button');
  wallBtn.textContent = '爬邊牆';
  wallBtn.style.borderColor = '#10b981';
  wallBtn.onclick = function() {
    var container = document.getElementById('scene-container');
    var sw = container ? container.offsetWidth : 300;
    ColorCatCharacter.startComboWall(sw);
  };
  bot.appendChild(wallBtn);

  var boxBtn = document.createElement('button');
  boxBtn.textContent = '爬紙箱';
  boxBtn.style.borderColor = '#10b981';
  boxBtn.onclick = function() {
    var container = document.getElementById('scene-container');
    var sw = container ? container.offsetWidth : 300;
    ColorCatCharacter.startComboBox(sw, 35, 125 - 46);
  };
  bot.appendChild(boxBtn);

  var biteBtn = document.createElement('button');
  biteBtn.textContent = '咬球';
  biteBtn.style.borderColor = '#ef4444';
  biteBtn.onclick = function() {
    var container = document.getElementById('scene-container');
    var sw = container ? container.offsetWidth : 300;
    ColorCatCharacter.startBiteBall(sw);
  };
  bot.appendChild(biteBtn);

  var watchBtn = document.createElement('button');
  watchBtn.textContent = '看花';
  watchBtn.style.borderColor = '#E8524A';
  watchBtn.onclick = function() {
    var container = document.getElementById('scene-container');
    var sw = container ? container.offsetWidth : 300;
    ColorCatCharacter.startWatchFlower(sw);
  };
  bot.appendChild(watchBtn);

  var ultBtn = document.createElement('button');
  ultBtn.textContent = '大絕招';
  ultBtn.style.borderColor = '#FFD700';
  ultBtn.style.fontWeight = 'bold';
  ultBtn.onclick = function() { ColorCatCharacter.startUltimate(); };
  bot.appendChild(ultBtn);

  var sep3 = document.createElement('span');
  sep3.textContent = '｜';
  sep3.style.cssText = 'font-size:.7rem;color:#999;align-self:center;';
  bot.appendChild(sep3);

  for (var wl = 1; wl <= 3; wl++) {
    (function(level) {
      var wBtn = document.createElement('button');
      wBtn.textContent = '虛弱' + level;
      wBtn.className = 'weak-btn';
      wBtn.style.borderColor = '#f59e0b';
      wBtn.onclick = function() {
        var cur = ColorCatCharacter.getWeakLevel();
        document.querySelectorAll('.weak-btn').forEach(function(b) { b.classList.remove('active'); });
        if (cur === level && ColorCatCharacter.isWeak()) {
          ColorCatCharacter.setWeak(0);
        } else {
          ColorCatCharacter.setWeak(level);
          wBtn.classList.add('active');
        }
      };
      bot.appendChild(wBtn);
    })(wl);
  }
})();

// ── 敵人工具列 ──
(function buildEnemyToolbar() {
  var bar = document.getElementById('toolbar-enemy');
  var E = window.ColorCatEnemy;
  if (!E) return;

  // 生成按鈕（10 個敵人皮膚）
  var skinKeys = Object.keys(E.SKINS);
  skinKeys.forEach(function(sk) {
    var btn = document.createElement('button');
    btn.textContent = E.SKINS[sk].name;
    btn.style.borderColor = '#e74c3c';
    btn.onclick = function() {
      var container = document.getElementById('scene-container');
      var sw = container ? container.offsetWidth : 300;
      E.spawn(sk, sw);
    };
    bar.appendChild(btn);
  });

  // 清除按鈕
  var clearBtn = document.createElement('button');
  clearBtn.textContent = '清除全部';
  clearBtn.style.borderColor = '#666';
  clearBtn.onclick = function() { E.clearAll(); };
  bar.appendChild(clearBtn);

  // 分隔線
  var sep = document.createElement('span');
  sep.textContent = '｜';
  sep.style.cssText = 'font-size:.7rem;color:#999;align-self:center;';
  bar.appendChild(sep);

  // 動作測試按鈕（8 個敵人動作）
  var actKeys = Object.keys(E.ACTIONS);
  actKeys.forEach(function(ak) {
    var btn = document.createElement('button');
    btn.textContent = E.ACTIONS[ak].label;
    btn.style.borderColor = '#9b59b6';
    btn.style.fontSize = '.6rem';
    btn.onclick = function() {
      var all = E.getAll();
      for (var i = 0; i < all.length; i++) {
        if (!all[i].dead) { E.testAction(i, ak); break; }
      }
    };
    bar.appendChild(btn);
  });
})();

// ── 啟動互動場景 ──
ColorCatScene.initInteractive('scene-container');
</script>
</body>
</html>
