  <!-- 全局圖片預解碼淡入：load 後呼叫 decode()，解碼完成才顯示（無閃爍） -->
  <script>
  document.addEventListener('load', function(e) {
    if (e.target.tagName !== 'IMG') return;
    var img = e.target;
    if (typeof img.decode === 'function') {
      img.decode().then(function() {
        img.classList.add('img-loaded');
      }).catch(function() {
        img.classList.add('img-loaded');
      });
    } else {
      img.classList.add('img-loaded');
    }
  }, true);
  document.addEventListener('error', function(e) {
    if (e.target.tagName === 'IMG') e.target.classList.add('img-loaded');
  }, true);
  // 頁面已存在的圖片（已完成載入或失敗的）立即標記（不淡入）
  document.querySelectorAll('img').forEach(function(img) {
    if (img.complete) img.classList.add('img-preloaded');
  });
  </script>

  <!-- 載入進度條動畫 + 網路環境偵測 -->
  <script>
    /* 白屏卡住偵測旗標：頁面內容成功渲染後由 navigation.js 設為 true */
    window._contentReady = false;
    /* 開機品牌圖：從 localStorage 讀取管理員設定 */
    (function() {
      try {
        var cfg = JSON.parse(localStorage.getItem('_bootBrand'));
        if (!cfg) return;
        var slot = document.querySelector('.boot-loading__image-slot');
        var brandImg = document.getElementById('boot-loading-brand-img');
        if (cfg.imageUrl && brandImg) brandImg.src = cfg.imageUrl;
        if (brandImg) {
          var scale = (cfg.imgHeight || 100) / 100;
          var moveY = -(cfg.marginTop || 0);
          brandImg.style.transform = 'scale(' + scale + ') translateY(' + moveY + '%)';
        }
        if (slot && cfg.bgMode) {
          if (cfg.bgMode === 'dark') slot.style.background = '#1e1e2e';
          else if (cfg.bgMode === 'light') slot.style.background = cfg.bgColor || '#1a1a2e';
          /* auto: 不設 inline style，由 CSS 處理 */
        }
      } catch(_) {}
    })();
    (function () {
      var overlay = document.getElementById('loading-overlay');
      var boot = overlay && overlay.querySelector('[data-boot-loading]');
      if (!overlay || !boot) return;

      var img = document.getElementById('boot-loading-brand-img');
      var pctEl = boot.querySelector('.boot-loading__pct');
      var fillEl = boot.querySelector('.boot-loading__fill');
      var barEl = boot.querySelector('.boot-loading__bar');
      var subEl = boot.querySelector('.boot-loading__sub');
      var timer = null;
      var progress = 0;

      function syncImageState() {
        if (!img) return;
        if (img.complete && img.naturalWidth > 0) {
          boot.classList.add('is-image-ready');
        } else {
          boot.classList.remove('is-image-ready');
        }
      }

      function render() {
        var shown = Math.max(0, Math.min(100, Math.floor(progress)));
        if (pctEl) pctEl.textContent = shown + '%';
        if (fillEl) fillEl.style.width = shown + '%';
        if (barEl) barEl.setAttribute('aria-valuenow', String(shown));
      }

      function stop() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function tick() {
        if (!overlay.isConnected || overlay.style.display === 'none') {
          stop();
          return;
        }
        if (progress >= 92) return;
        var step = progress < 35 ? (4 + Math.random() * 5) :
          progress < 70 ? (2 + Math.random() * 3.5) :
          (0.8 + Math.random() * 1.8);
        progress = Math.min(92, progress + step);
        render();
      }

      function start() {
        if (timer) return;
        tick();
        timer = setInterval(tick, 180);
      }

      if (img) {
        img.addEventListener('load', syncImageState);
        img.addEventListener('error', syncImageState);
        syncImageState();
      }

      if (subEl) {
        // ─── Tier 1：即刻顯示瀏覽器 connection 估算（< 1ms）───
        // 僅顯示 type + Mbps（不標 4G/5G、避免誤判）
        // navigator.connection 在 iOS Safari / Firefox 不支援 → 退到「偵測中」、後續 Tier 2 補上
        var networkLabel = '偵測中';
        var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (navigator.onLine === false) {
          networkLabel = '離線';
          subEl.textContent = '網路環境（離線）等待重連..';
        } else {
          if (conn) {
            var t = conn.type;
            var dl = conn.downlink; // Mbps（瀏覽器估算）
            if (t === 'wifi') networkLabel = 'Wi-Fi';
            else if (t === 'cellular') networkLabel = '行動';
            else if (t === 'ethernet') networkLabel = '有線';
            else if (conn.effectiveType) networkLabel = String(conn.effectiveType).toUpperCase();
            if (dl && isFinite(dl) && dl > 0) {
              networkLabel += ' · ' + (dl >= 10 ? Math.round(dl) : (Math.round(dl * 10) / 10)) + 'Mbps';
            }
          }
          subEl.textContent = '網路環境（' + networkLabel + '）載入資料中..';

          // ─── Tier 2：實測 RTT（並行 fetch favicon、~50-500ms 回應後更新）───
          // ?probe=<random> + cache:'no-store' 雙保險避開 SW / browser cache 命中
          var _probeStart = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
          try {
            fetch('/favicon.ico?probe=' + Date.now(), { cache: 'no-store' })
              .then(function () {
                var _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                var rtt = Math.round(_now - _probeStart);
                var speed;
                if (rtt < 100) speed = '極快';
                else if (rtt < 300) speed = '快速';
                else if (rtt < 800) speed = '一般';
                else if (rtt < 2000) speed = '慢';
                else speed = '極慢';
                // Race condition guard：boot 結束後 subEl 可能仍在 DOM 但 overlay 已隱藏
                var ov = document.getElementById('loading-overlay');
                if (subEl.parentElement && ov && ov.style.display !== 'none') {
                  subEl.textContent = '網路（' + networkLabel + ' · ' + speed + ' ' + rtt + 'ms）載入中..';
                }
              })
              .catch(function () { /* 失敗保留 Tier 1 顯示 */ });
          } catch (_) { /* 不支援 fetch 或同步錯誤、無視 */ }
        }
      }

      render();
      window._bootLoadingAnim = { start: start, stop: stop };
    })();
  </script>

        window._bootLoadingAnim.start();
      }
      // 安全逾時：若 loading overlay 超過 20 秒仍未消失則強制關閉
      window._loadingSafety = setTimeout(function() {
        var ov = document.getElementById('loading-overlay');
        if (ov && ov.style.display !== 'none') {
          ov.style.display = 'none';
          if (window._bootLoadingAnim && typeof window._bootLoadingAnim.stop === 'function') {
            window._bootLoadingAnim.stop();
          }
          document.documentElement.classList.remove('prod-early');
          console.warn('[Boot] Loading overlay safety timeout triggered.');
          if (typeof _startContentStallCheck === 'function') _startContentStallCheck();
        }
      }, 20000);
    }
  </script>

  <!-- Service Worker Registration + 版本更新 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!window._swReloading && !window._appInitializing && !window._swJustCleared) {
          window._swReloading = true; location.reload();
        }
      });
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(function(){});
      });
    }
  </script>
  <!-- 腳本載入失敗時的安全恢復機制 -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.indexOf(location.origin) === 0) {
        console.error('[Boot] Script failed:', e.target.src);
        var b = document.getElementById('_recovery_btn');
        if (!b) {
          b = document.createElement('button');
          b.id = '_recovery_btn';
          b.textContent = '腳本載入失敗，點我清快取後重整';
          b.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;padding:1rem 2rem;font-size:1rem;background:#dc2626;color:#fff;border:none;border-radius:8px;cursor:pointer';
          b.onclick = function() {
            if ('caches' in window) caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
            if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(w){w.unregister()})});
            setTimeout(function(){ location.reload(true); }, 300);
          };
          document.body.appendChild(b);
        }
      }
    }, true);
  </script>
  <!-- 開機看門狗：清快取後 8 秒內未完成初始化則自動重載（最多 2 次） -->
  <!-- 2026-04-26：加 _contentReady / App._cloudReady 檢查、避免已完成 boot 後仍誤觸 reload -->
  <!-- iOS Safari 上連線不穩時會踩到此 watchdog、進 admin-users 後 8 秒被強制 reload 形成迴圈 -->
  <script>
  (function(){
    try{
      var w=sessionStorage.getItem('_bootWatchdog');
      if(!w)return;
      var remain=parseInt(w)||0;
      if(remain<=0){sessionStorage.removeItem('_bootWatchdog');return;}
      window._bootWatchdogTimer=setTimeout(function(){
        // boot 已完成（首頁有內容 / cloud ready）→ 不 reload、清 watchdog
        if(window._contentReady||(typeof App!=='undefined'&&App._cloudReady)){
          sessionStorage.removeItem('_bootWatchdog');
          window._bootWatchdogTimer=null;
          return;
        }
        sessionStorage.setItem('_bootWatchdog',String(remain-1));
        location.reload();
      },8000);
    }catch(e){}
  })();
  </script>
