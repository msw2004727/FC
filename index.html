      var pid = typeof firebaseConfig !== 'undefined' && firebaseConfig.projectId;
      var key = typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey;
      if (!pid || !key) return null;
      var directUrl = 'https://firestore.googleapis.com/v1/projects/' + pid + '/databases/(default)/documents/tournaments/' + encodeURIComponent(tournamentId) + '?key=' + encodeURIComponent(key);
      var directResp = await fetch(directUrl);
      if (directResp.ok) {
        var doc = await directResp.json();
        if (doc && doc.fields) return this._convertFirestoreRestDoc(doc, tournamentId);
      }
      var queryUrl = 'https://firestore.googleapis.com/v1/projects/' + pid + '/databases/(default)/documents:runQuery?key=' + encodeURIComponent(key);
      var queryResp = await fetch(queryUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ structuredQuery: { from: [{ collectionId: 'tournaments' }], where: { fieldFilter: { field: { fieldPath: 'id' }, op: 'EQUAL', value: { stringValue: tournamentId } } }, limit: 1 } })
      });
      if (!queryResp.ok) return null;
      var results = await queryResp.json();
      if (Array.isArray(results) && results.length > 0 && results[0].document) {
        return this._convertFirestoreRestDoc(results[0].document, tournamentId);
      }
      return null;
    } catch (err) {
      console.warn('[DeepLink] REST tournament fetch failed:', err);
      return null;
    }
  },

  _startDeepLinkGuard() {
    const pending = this._getPendingDeepLink();
    if (!pending) return;
    this._bootDeepLink = pending;
    this._deepLinkAuthRedirecting = false;
    this._showDeepLinkOverlay(pending.type);
    this._stopDeepLinkGuard();

    this._bootDeepLinkTimer = setTimeout(() => {
      if (!this._getPendingDeepLink()) return;
      const isAuthedNow = (typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn());
      if (!isAuthedNow && pending.type !== 'event' && pending.type !== 'team' && pending.type !== 'tournament') {
        // For unauthenticated deep links (except event/team/tournament which have REST fallback), prioritize LINE login redirect.
        this._tryStartDeepLinkLogin();
        this._bootDeepLinkTimer = setTimeout(() => {
          if (!this._getPendingDeepLink()) return;
          const isAuthedRetry = (typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn());
          if (!isAuthedRetry) {
            this._completeDeepLinkFallback('\u8acb\u5148\u5b8c\u6210 LINE \u767b\u5165\u5f8c\u518d\u958b\u555f\u9023\u7d50\u3002', 'page-home');
            return;
          }
          const retryTargetMap = { team: 'page-teams', tournament: 'page-tournaments', profile: 'page-profile' };
          const retryTarget = retryTargetMap[pending.type] || 'page-activities';
          this._completeDeepLinkFallback('\u9801\u9762\u8f09\u5165\u5df2\u903e\u6642\uff0c\u5df2\u5207\u63db\u5230\u5217\u8868\u3002', retryTarget);
        }, this._deepLinkBootTimeoutMs);
        return;
      }
      const fallbackPageMap = { team: 'page-teams', tournament: 'page-tournaments', profile: 'page-profile' };
      const targetPage = fallbackPageMap[pending.type]
        || (isAuthedNow ? 'page-activities' : 'page-home');
      const fallbackMessage = pending.type === 'event' && !isAuthedNow
        ? '\u6d3b\u52d5\u8a73\u60c5\u8f09\u5165\u5df2\u903e\u6642\uff0c\u5df2\u5207\u56de\u9996\u9801\u3002'
        : '\u9801\u9762\u8f09\u5165\u5df2\u903e\u6642\uff0c\u5df2\u5207\u63db\u5230\u5217\u8868\u3002';
      this._completeDeepLinkFallback(fallbackMessage, targetPage);
    }, this._deepLinkBootTimeoutMs);

    this._bootDeepLinkPoller = setInterval(() => {
      void this._tryOpenPendingDeepLink();
    }, 280);
  },

  async _tryOpenPendingDeepLink() {
    try {
      if (this._deepLinkRendered) return true;  // instant path 已完成
      if (this._instantDeepLinkMode) return false;  // instant path 正在處理，poller 不介入

      const pending = this._getPendingDeepLink();
      if (!pending) return true;

      // 2026-04-19 fix: 用戶在 deep-link poller 跑期間已主動進入其他活動詳情頁
      // → 放棄 pending，停止 poller，避免把用戶從自己選的活動拉到 deep-link 指定活動
      if (pending.type === 'event'
        && this.currentPage === 'page-activity-detail'
        && this._currentDetailEventId
        && this._currentDetailEventId !== pending.id) {
        console.log('[DeepLink] user opened different event (', this._currentDetailEventId,
          ') — cancelling pending deep link to', pending.id);
        this._clearPendingDeepLink();
        this._stopDeepLinkGuard();
        this._clearDeepLinkQueryParams();
        this._hideDeepLinkOverlay();
        return true;
      }

      const key = `${pending.type}:${pending.id}`;
      if (this._pendingDeepLinkOpenPromise && this._pendingDeepLinkOpenKey === key) {
        return await this._pendingDeepLinkOpenPromise;
      }

      const isAuthed = (typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn());
      if (!isAuthed && pending.type !== 'event' && pending.type !== 'team' && pending.type !== 'tournament') {
        this._tryStartDeepLinkLogin();
        return false;
      }

      const openPromise = (async () => {
        if (pending.type === 'event') {
          let event = ApiService.getEvent?.(pending.id);
          // 快取未命中時，嘗試直接從 Firestore 取單筆活動（guest deep link 快速路徑）
          if (!event && typeof db !== 'undefined') {
            try {
              // 先嘗試以 pending.id 作為 doc path
              let doc = await db.collection('events').doc(pending.id).get();
              // 若 doc path 找不到，改用 id 欄位查詢（因為 docId 與 dataId 可能不同）
              if (!doc.exists) {
                const snap = await db.collection('events').where('id', '==', pending.id).limit(1).get();
                if (!snap.empty) doc = snap.docs[0];
              }
              if (doc.exists) {
                event = { ...doc.data(), _docId: doc.id };
                if (!event.id) event.id = doc.id;
                const cache = FirebaseService._cache.events;
                if (!cache.find(e => e.id === event.id || e._docId === doc.id)) {
                  cache.push(event);
                }
              }
            } catch (err) {
              console.warn('[DeepLink] direct event fetch failed:', err);
            }
          }
          if (!event) return false;

          // 未認證時啟用 instant mode，跳過 ensureCollectionsForPage 避免權限錯誤
          if (!isAuthed) this._instantDeepLinkMode = true;
          try {
            const result = await this.showEventDetail(pending.id, { allowGuest: !isAuthed });
            if (result?.ok && this.currentPage === 'page-activity-detail' && this._currentDetailEventId === pending.id) {
              this._completeDeepLinkSuccess();
              return true;
            }
            if (result?.reason === 'forbidden') {
              this._completeDeepLinkFallback('\u7121\u6cd5\u958b\u555f\u6d3b\u52d5\u8a73\u60c5\uff0c\u5df2\u5207\u56de\u5217\u8868\u3002', 'page-activities');
              return true;
            }
          } finally {
            if (!isAuthed) this._instantDeepLinkMode = false;
          }
          return false;
        }

        if (pending.type === 'team') {
          let team = ApiService.getTeam?.(pending.id);
          if (!team) {
            // Phase 2A §7.5：快取未命中 → 單筆查詢
            if (isAuthed) {
              team = await FirebaseService.fetchTeamIfMissing(pending.id);
            } else {
              // §7.10 Pre-auth REST：未登入也能透過 API key 取得俱樂部資料
              team = await this._fetchTeamViaRest(pending.id);
              if (team && typeof FirebaseService !== 'undefined' && FirebaseService._cache) {
                if (!FirebaseService._cache.teams.find(function(t) { return t.id === team.id; })) {
                  FirebaseService._cache.teams.push(team);
                }
              }
            }
          }
          if (!team) return false;

          if (!isAuthed) this._instantDeepLinkMode = true;
          try {
            const result = await this.showTeamDetail(pending.id, { allowGuest: !isAuthed });
            if (result?.ok && this.currentPage === 'page-team-detail' && this._teamDetailId === pending.id) {
              this._completeDeepLinkSuccess();
              return true;
            }
          } finally {
            if (!isAuthed) this._instantDeepLinkMode = false;
          }
          return false;
        }

        if (pending.type === 'tournament') {
          let tournament = ApiService.getTournament?.(pending.id);
          if (!tournament) {
            if (isAuthed) {
              tournament = await FirebaseService.fetchTournamentIfMissing(pending.id);
            } else {
              // §7.10 Pre-auth REST
              tournament = await this._fetchTournamentViaRest(pending.id);
              if (tournament && typeof FirebaseService !== 'undefined' && FirebaseService._cache) {
                if (!FirebaseService._cache.tournaments.find(function(t) { return t.id === tournament.id; })) {
                  FirebaseService._cache.tournaments.push(tournament);
                }
              }
            }
          }
          if (!tournament) return false;

          if (!isAuthed) this._instantDeepLinkMode = true;
          try {
            await ScriptLoader.ensureForPage('page-tournament-detail');
            await this.showTournamentDetail(pending.id, { allowGuest: !isAuthed });
            if (this.currentPage === 'page-tournament-detail' && this.currentTournament === pending.id) {
              this._completeDeepLinkSuccess();
              return true;
            }
          } finally {
            if (!isAuthed) this._instantDeepLinkMode = false;
          }
          return false;
        }

        if (pending.type === 'profile') {
          const users = ApiService.getAdminUsers?.() || [];
          const user = users.find(u => u.uid === pending.id || u.lineUserId === pending.id);
          if (!user) return false;

          const name = user.displayName || user.name;
          if (!name) return false;
          await this.showUserProfile(name);
          this._completeDeepLinkSuccess();
          return true;
        }

        return false;
      })();

      this._pendingDeepLinkOpenKey = key;
      this._pendingDeepLinkOpenPromise = openPromise.finally(() => {
        if (this._pendingDeepLinkOpenKey === key) {
          this._pendingDeepLinkOpenKey = '';
          this._pendingDeepLinkOpenPromise = null;
        }
      });

      return await this._pendingDeepLinkOpenPromise;
    } catch (err) {
      console.warn('[DeepLink] pending open failed:', err);
      return false;
    }
  },

  _scheduleCloudBoot(reason = 'post-boot') {
    if (this._cloudReady || this._cloudReadyPromise || this._cloudBootScheduled) return;

    this._cloudBootScheduled = true;
    const kickoff = () => {
      this._cloudBootScheduled = false;
      void this.ensureCloudReady({ reason }).catch(() => {});
    };

    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => setTimeout(kickoff, 0));
      return;
    }
    setTimeout(kickoff, 0);
  },

  // detail 頁面需要 ID 才能渲染，hash 還原無法提供 ID → 退回父頁面
  _DETAIL_PAGE_FALLBACK: {
    'page-team-detail': 'page-teams',
    'page-activity-detail': 'page-activities',
    'page-tournament-detail': 'page-tournaments',
    'page-edu-groups': 'page-teams',
    'page-edu-students': 'page-teams',
    'page-edu-course-plan': 'page-teams',
    'page-edu-course-lessons': 'page-teams',
    'page-edu-checkin': 'page-teams',
    'page-edu-calendar': 'page-teams',
    'page-edu-student-apply': 'page-teams',
  },

  _resolveBootPageId(pageId) {
    return this._DETAIL_PAGE_FALLBACK[pageId] || pageId;
  },

  _isBootHashShellPage(pageId) {
    return ['page-activities', 'page-teams', 'page-tournaments'].includes(pageId);
  },

  _getBootHashPageId() {
    try {
      const bootUrl = new URL(window.location.href);
      const hashOnUrl = (location.hash || '').replace(/^#/, '').trim();
      const ridParam = bootUrl.searchParams.get('rid');
      const rawPageId = (ridParam && (!hashOnUrl || hashOnUrl === 'page-temp-participant-report'))
        ? 'page-temp-participant-report'
        : hashOnUrl;
      const pageId = this._resolveBootPageId(rawPageId);
      if (!pageId || pageId === 'page-home' || !/^page-[\w-]+$/.test(pageId)) return '';
      return pageId;
    } catch (_) {
      return '';
    }
  },

  _syncBottomTabForPage(pageId) {
    const mainPages = ['page-home', 'page-activities', 'page-teams', 'page-messages', 'page-profile', 'page-tournaments'];
    const tabPage = ({
      'page-activity-detail': 'page-activities',
      'page-team-detail': 'page-teams',
      'page-tournament-detail': 'page-tournaments',
      'page-user-card': 'page-profile',
    })[pageId] || pageId;
    document.querySelectorAll('.bot-tab').forEach(tab => {
      tab.classList.toggle('active', mainPages.includes(tabPage) && tab.dataset.page === tabPage);
    });
  },

  _getHistoryRouteFlags() {
    return (window.HISTORY_ROUTE_FLAGS && typeof window.HISTORY_ROUTE_FLAGS === 'object')
      ? window.HISTORY_ROUTE_FLAGS
      : {};
  },

  _readCurrentHistoryRoute() {
    try {
      const flags = this._getHistoryRouteFlags();
      if (!flags.parseRead || !window.HistoryRouteAdapter?.parseCurrentLocation) return null;
      return window.HistoryRouteAdapter.parseCurrentLocation(window.location, {
        usersPathEnabled: !!flags.usersPathEnabled,
      });
    } catch (_) {
      return null;
    }
  },

  _hasLegacyRouteSignal() {
    try {
      const url = new URL(window.location.href);
      if (['event', 'team', 'tournament', 'profile', 'rid', 'news'].some(key => url.searchParams.has(key))) return true;
      const hash = (location.hash || '').replace(/^#/, '').trim();
      return !!(hash && hash !== 'page-home');
    } catch (_) {
      return false;
    }
  },

  _isCurrentHistoryRouteForPage(pageId) {
    const route = this._readCurrentHistoryRoute();
    if (!route || !route.pageId || route.pageId !== pageId) return false;
    return !this._hasLegacyRouteSignal();
  },

  _isCurrentHistoryDetailRoute(pageId, id) {
    const route = this._readCurrentHistoryRoute();
    if (!route || !route.pageId || route.pageId !== pageId) return false;
    if (String(route.id || '').trim() !== String(id || '').trim()) return false;
    return !this._hasLegacyRouteSignal();
  },

  _getListRoutePath(pageId) {
    // V5 §6 路由對照表規劃 / / /profile 也走 clean URL,Phase 4 漏掉,2026-05-11 補上
    return ({
      'page-home':       '/',
      'page-activities': '/activities',
      'page-teams':      '/teams',
      'page-tournaments': '/tournaments',
      'page-profile':    '/profile',
    })[pageId] || '';
  },

  _getExplicitDetailRouteId(routeOrPageId) {
    if (!routeOrPageId || typeof routeOrPageId === 'string') return '';
    return String(routeOrPageId.id
      || routeOrPageId.eventId
      || routeOrPageId.teamId
      || routeOrPageId.tournamentId
      || '').trim();
  },

  _isSafeHistoryRouteSegment(id) {
    const value = String(id || '').trim();
    if (!value) return false;
    if (window.HistoryRouteAdapter?.isSafeRouteSegment) {
      return !!window.HistoryRouteAdapter.isSafeRouteSegment(value);
    }
    if (value === '.' || value === '..') return false;
    if (value.indexOf('/') !== -1 || value.indexOf('\\') !== -1) return false;
    return /^[A-Za-z0-9_-]{3,80}$/.test(value);
  },

  _getDetailRoutePath(pageId, id) {
    const safeId = String(id || '').trim();
    if (!safeId || !this._isSafeHistoryRouteSegment(safeId)) return '';
    const root = ({
      'page-activity-detail': '/events',
      'page-team-detail': '/teams',
      'page-tournament-detail': '/tournaments',
    })[pageId] || '';
    return root ? root + '/' + encodeURIComponent(safeId) : '';
  },

  _shouldDisableHistoryPathWrite(flags) {
    if (!flags?.liffPathDisable) return false;
    try {
      const liffClient = window.liff
        && typeof window.liff.isInClient === 'function'
        && window.liff.isInClient();
      return !!liffClient;
    } catch (_) {
      return true;
    }
  },

  // ====================================================================
  // Phase 6 — popstate handler / sentinel / route intent helpers
  // 詳:docs/history-api-dual-route-plan.md §8.9 V6 + decisions D6/D10-D14
  // ====================================================================

  _popstateRequestSeq: 0,
  _bootSentinelPushed: false,

  /** 驗證 hash pageId 真的對應 SPA 頁面（避免 #section 錨點被誤判為 pageId）*/
  _validatePageId(pageId) {
    if (!pageId) return null;
    if (document.getElementById(pageId)) return pageId;
    if (typeof PageLoader !== 'undefined' && PageLoader._pageFileMap?.[pageId]) return pageId;
    return null;
  },

  /** 解析既有 legacy query route(?event= / ?team= / ?tournament= / ?profile=)*/
  _parseLegacyQueryRoute(searchString) {
    try {
      const params = new URLSearchParams(String(searchString || ''));
      const mapping = [
        { key: 'event', pageId: 'page-activity-detail' },
        { key: 'team', pageId: 'page-team-detail' },
        { key: 'tournament', pageId: 'page-tournament-detail' },
        { key: 'profile', pageId: 'page-user-card' },
      ];
      for (const { key, pageId } of mapping) {
        const id = String(params.get(key) || '').trim();
        if (id && this._isSafeHistoryRouteSegment?.(id)) return { pageId, id };
      }
    } catch (_) {}
    return null;
  },

  /** D11 + D13 共用 route 解析。順序遵循 §5.1:
   *   state(source guard 通過且非 sentinel)→ legacy query → clean path → validated hash → page-home
   *  opts:
   *   - state:明確指定的 state(若未提供則讀 history.state)
   *   - skipState:跳過 state 那層
   *   - loc:預設 window.location
   */
  _resolveRouteIntent(opts) {
    opts = opts || {};
    const loc = opts.loc || window.location;
    const flags = this._getHistoryRouteFlags?.() || {};

    if (!opts.skipState) {
      const st = opts.state !== undefined ? opts.state : history.state;
      if (st && st.source === 'sportshub' && !st.sentinel && st.pageId) {
        return { pageId: st.pageId, id: st.id || null };
      }
    }
    const legacy = this._parseLegacyQueryRoute(loc.search);
    if (legacy && legacy.pageId) return { pageId: legacy.pageId, id: legacy.id || null };

    if (window.HistoryRouteAdapter && typeof window.HistoryRouteAdapter.parseHistoryRoute === 'function') {
      const parsed = window.HistoryRouteAdapter.parseHistoryRoute(
        loc.pathname,
        { usersPathEnabled: !!flags.usersPathEnabled }
      );
      if (parsed && parsed.pageId && parsed.pageId !== 'page-home') {
        return { pageId: parsed.pageId, id: parsed.id || null };
      }
    }
    const hashPageId = this._validatePageId((loc.hash || '').replace(/^#/, ''));
    if (hashPageId) return { pageId: hashPageId, id: null };

    return { pageId: 'page-home', id: null };
  },

  /** D11:從當前 location + cached SPA state 反推 page state(供 sentinel push E1 用)*/
  _buildCurrentRouteState() {
    const existing = history.state;
    if (existing && existing.source === 'sportshub' && !existing.sentinel && existing.pageId) {
      return existing;
    }
    const intent = this._resolveRouteIntent({ skipState: true });
    return {
      source: 'sportshub',
      pageId: intent.pageId,
      ...(intent.id ? { id: intent.id } : {}),
    };
  },

  _buildRouteStateForCurrentPage(pageId = this.currentPage || 'page-home') {
    const safePageId = String(pageId || 'page-home').trim() || 'page-home';
    const state = { source: 'sportshub', pageId: safePageId };
    let id = '';
    if (safePageId === 'page-activity-detail') id = this._currentDetailEventId || '';
    else if (safePageId === 'page-team-detail') id = this._teamDetailId || '';
    else if (safePageId === 'page-tournament-detail') id = this.currentTournament || '';
    else if (safePageId === 'page-user-card') id = this._ucRecordUid || '';
    try {
      const existing = history.state;
      if (!id && existing?.source === 'sportshub' && existing.pageId === safePageId && existing.id) {
        id = existing.id;
      }
    } catch (_) {}
    if (id && this._isSafeHistoryRouteSegment?.(id)) state.id = String(id).trim();
    return state;
  },

  /** D11 觸發條件:只在 LIFF / Mini App / PWA standalone 內安裝 sentinel */
  _shouldInstallSentinel() {
    try {
      const isLiffInClient = !!(window.liff
        && typeof window.liff.isInClient === 'function'
        && window.liff.isInClient());
      const isStandalonePWA = !!(window.matchMedia
        && window.matchMedia('(display-mode: standalone)').matches);
      return isLiffInClient || isStandalonePWA;
    } catch (_) {
      return false;
    }
  },

  /** D11:boot 完成後安裝 sentinel(防退出 Mini App)
   *  雙寫策略:replaceState 把當前 E0 改 sentinel + pushState 把當前頁變 E1
   *  user 按返回 → E0 active → popstate event.state = sentinel ✓ 攔截成功
   */
  _maybePushBootSentinel() {
    try {
      const flags = this._getHistoryRouteFlags?.() || {};
      if (!flags.popstateTakeover) return;
      if (this._bootSentinelPushed) return;
      if (!this._shouldInstallSentinel()) return;

      this._bootSentinelPushed = true;

      const currentState = this._buildCurrentRouteState();
      const originalUrl = window.location.href;

      history.replaceState(
        { source: 'sportshub', sentinel: true, fallbackPageId: 'page-home' },
        '',
        '/'
      );
      history.pushState(currentState, '', originalUrl);
    } catch (err) {
      console.warn('[Phase6] _maybePushBootSentinel failed:', err);
    }
  },

  _getPageMetaMap() {
    return {
      'page-home':              { path: '/', ogType: 'website' },
      'page-activities':        { path: '/activities', ogType: 'website' },
      'page-teams':             { path: '/teams', ogType: 'website' },
      'page-tournaments':       { path: '/tournaments', ogType: 'website' },
      'page-profile':           { path: '/profile', ogType: 'profile' },
      'page-activity-detail':   { detailRoot: '/events', ogType: 'event' },
      'page-team-detail':       { detailRoot: '/teams', ogType: 'website' },
      'page-tournament-detail': { detailRoot: '/tournaments', ogType: 'event' },
    };
  },

  _updateRouteMetaTags(pageId, ctx) {
    const map = this._getPageMetaMap();
    const entry = map[String(pageId || '').trim()];
    if (!entry) return false;
    let path = entry.path || '';
    if (entry.detailRoot) {
      const id = String((ctx && ctx.id) || '').trim();
      if (!id || !this._isSafeHistoryRouteSegment(id)) return false;
      path = entry.detailRoot + '/' + encodeURIComponent(id);
    }
    const canonicalUrl = 'https://toosterx.com' + path;
    try {
      const head = document.head;
      if (!head) return false;
      const canonical = head.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', canonicalUrl);
      ['zh-TW', 'x-default'].forEach((lang) => {
        const el = head.querySelector('link[rel="alternate"][hreflang="' + lang + '"]');
        if (el) el.setAttribute('href', canonicalUrl);
      });
      const ogUrl = head.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.setAttribute('content', canonicalUrl);
      if (entry.ogType) {
        const ogType = head.querySelector('meta[property="og:type"]');
        if (ogType) ogType.setAttribute('content', entry.ogType);
      }
      return true;
    } catch (_) {
      return false;
    }
  },

  _setRouteUrl(routeOrPageId, options = {}) {
    const pageId = typeof routeOrPageId === 'string'
      ? routeOrPageId
      : String(routeOrPageId?.pageId || '').trim();
    if (!pageId) return false;

    if (options.suppressHashSync) return true;

    try {
      const flags = this._getHistoryRouteFlags();
      const shouldReplace = options.replace === true || options.mode === 'replace';
      const targetHash = '#' + pageId;
      const url = new URL(window.location.href);
      const pathWritesDisabled = this._shouldDisableHistoryPathWrite(flags);
      const detailId = this._getExplicitDetailRouteId(routeOrPageId);
      const detailPath = flags.writeDetailPaths && !pathWritesDisabled
        ? this._getDetailRoutePath(pageId, detailId)
        : '';
      const listPath = flags.writeListPaths && !pathWritesDisabled
        ? this._getListRoutePath(pageId)
        : '';

      if (!detailPath && this._isCurrentHistoryRouteForPage(pageId)) return true;

      if (detailPath && (history?.pushState || history?.replaceState)) {
        if (url.pathname === detailPath && !url.search && !url.hash) return true;
        const state = { source: 'sportshub', pageId, id: detailId };
        if (shouldReplace && history.replaceState) {
          history.replaceState(state, '', detailPath);
        } else if (history.pushState) {
          history.pushState(state, '', detailPath);
        } else {
          history.replaceState(state, '', detailPath);
        }
        return true;
      }

      if (listPath && (history?.pushState || history?.replaceState)) {
        let listTargetPath = listPath;
        if (pageId === 'page-activities') {
          if (typeof this._getActivityListRoutePath === 'function') {
            listTargetPath = this._getActivityListRoutePath(listPath);
          } else if (url.pathname === listPath && url.search && !this._hasLegacyRouteSignal?.()) {
            listTargetPath = listPath + url.search;
          }
        }
        if ((url.pathname + (url.search || '')) === listTargetPath && !url.hash) return true;
        const state = { source: 'sportshub', pageId };
        if (shouldReplace && history.replaceState) {
          history.replaceState(state, '', listTargetPath);
        } else if (history.pushState) {
          history.pushState(state, '', listTargetPath);
        } else {
          history.replaceState(state, '', listTargetPath);
        }
        return true;
      }

      // Phase 6 Commit A:hash fallback 兩條路徑都帶完整 state(含 detail id),
      //                  讓 popstate handler 能正確還原 detail data。
      const stateForHashWrite = detailId
        ? { source: 'sportshub', pageId, id: detailId }
        : { source: 'sportshub', pageId };

      if (flags.cleanHashFallbackPath && url.pathname && url.pathname !== '/') {
        history.replaceState(stateForHashWrite, '', '/' + targetHash);
        return true;
      }

      if (location.hash === targetHash) return true;
      if (shouldReplace && history?.replaceState) {
        url.hash = targetHash;
        history.replaceState(stateForHashWrite, '', url.pathname + (url.search || '') + (url.hash || ''));
      } else if (history?.pushState) {
        url.hash = targetHash;
        history.pushState(stateForHashWrite, '', url.pathname + (url.search || '') + (url.hash || ''));
      } else {
        location.hash = pageId;
      }
      return true;
    } catch (_) {
      try {
        if (pageId && location.hash !== '#' + pageId) location.hash = pageId;
      } catch (__) {}
      return false;
    }
  },

  _isBootHistoryShellPage(pageId) {
    return ['page-activities', 'page-teams', 'page-tournaments', 'page-profile'].includes(pageId);
  },

  _captureBootActivityFilterSearch(searchString = window.location.search) {
    try {
      const params = new URLSearchParams(String(searchString || ''));
      const hasActivityFilter = ['region', 'sport', 'tab', 'type'].some(key => params.has(key));
      this._bootActivityFilterSearch = hasActivityFilter ? String(searchString || '') : '';
      return this._bootActivityFilterSearch;
    } catch (_) {
      this._bootActivityFilterSearch = '';
      return '';
    }
  },

  _readActivityBootShellFilters(searchString) {
    const fallback = {
      hasExplicit: false,
      region: '\u5168\u90e8',
      sport: 'all',
      tab: 'normal',
      type: '',
    };
    try {
      const search = String(searchString || this._bootActivityFilterSearch || window.location.search || '');
      const params = new URLSearchParams(search);
      const hasExplicit = ['region', 'sport', 'tab', 'type'].some(key => params.has(key));
      const regionMap = {
        all: '\u5168\u90e8',
        north: '\u5317\u90e8',
        central: '\u4e2d\u90e8',
        south: '\u5357\u90e8',
        'east-islands': '\u6771\u90e8&\u5916\u5cf6',
      };
      const normalizeRegion = (value) => {
        const raw = String(value || '').trim().replace(/&amp;/g, '&');
        if (!raw) return regionMap.all;
        const lower = raw.toLowerCase();
        if (regionMap[lower]) return regionMap[lower];
        return Object.values(regionMap).includes(raw) ? raw : regionMap.all;
      };
      const normalizeSport = (value) => {
        const raw = String(value || '').trim();
        if (!raw || raw === 'all') return 'all';
        if (typeof getSportKeySafe === 'function') return getSportKeySafe(raw) || 'all';
        const options = (typeof window !== 'undefined' && Array.isArray(window.EVENT_SPORT_OPTIONS))
          ? window.EVENT_SPORT_OPTIONS
          : (typeof EVENT_SPORT_OPTIONS !== 'undefined' && Array.isArray(EVENT_SPORT_OPTIONS) ? EVENT_SPORT_OPTIONS : []);
        return options.some(item => item && item.key === raw) ? raw : 'all';
      };
      const normalizeTab = (value) => {
        const raw = String(value || '').trim();
        return ['normal', 'calendar', 'female'].includes(raw) ? raw : 'normal';
      };
      const normalizeType = (value) => {
        const raw = String(value || '').trim();
        return ['play', 'camp', 'watch', 'external'].includes(raw) ? raw : '';
      };
      return {
        hasExplicit,
        region: normalizeRegion(params.get('region')),
        sport: normalizeSport(params.get('sport')),
        tab: normalizeTab(params.get('tab')),
        type: normalizeType(params.get('type')),
      };
    } catch (_) {
      return fallback;
    }
  },

  _applyActivityBootShellFilters(filters = this._readActivityBootShellFilters?.()) {
    const target = document.getElementById('page-activities');
    if (!target || !filters || !filters.hasExplicit) return false;

    this._activityActiveTab = filters.tab;
    this._activeRegionTab = filters.region;
    this._activeSport = filters.sport;

    target.querySelectorAll('#activity-tabs .tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.atab === filters.tab);
    });

    const listEl = target.querySelector('#activity-list');
    const calendarEl = target.querySelector('#activity-calendar');
    if (listEl) listEl.hidden = filters.tab === 'calendar';
    if (calendarEl) calendarEl.hidden = filters.tab !== 'calendar';

    const typeFilter = target.querySelector('#activity-filter-type');
    const keywordFilter = target.querySelector('#activity-filter-keyword');
    if (typeFilter) typeFilter.value = filters.type;
    if (keywordFilter) keywordFilter.value = '';

    target.querySelectorAll('#activity-region-tabs .region-tab').forEach(btn => {
      const btnRegion = String(btn.getAttribute('data-region') || '').replace(/&amp;/g, '&');
      btn.classList.toggle('active', btnRegion === filters.region);
    });

    document.querySelectorAll('.sport-picker-item[data-sport]').forEach(item => {
      const active = item.dataset.sport === filters.sport;
      item.classList.toggle('active', active);
      item.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    const iconEl = document.querySelector('#sport-picker-wrapper .sport-picker-icon');
    if (iconEl && filters.sport === 'all') {
      iconEl.innerHTML = '<span class="sp-all-label" aria-hidden="true">All</span>';
    } else if (iconEl && typeof getSportIconSvg === 'function') {
      iconEl.innerHTML = getSportIconSvg(filters.sport);
    }
    return true;
  },

  _finishActivityBootHistoryShellFirstPaint() {
    try {
      if (this._bootHistoryTargetPageId !== 'page-activities') return false;
      if (!window._bootHistoryNavPending && window._bootHistoryNavCompleted) return false;
      if (typeof _dismissBootOverlayAfterHistoryNav !== 'function') return false;
      _dismissBootOverlayAfterHistoryNav('activity-shell-ready');
      return true;
    } catch (_) {
      return false;
    }
  },

  _prepareActivityBootHistoryShell() {
    if (this._bootHistoryTargetPageId !== 'page-activities') return false;
    if (!document.getElementById('page-activities')) return false;

    this._applyActivityBootShellFilters?.();
    if (this._bootHistoryActivityShellReadyPromise) return true;
    if (typeof ScriptLoader === 'undefined' || typeof ScriptLoader.ensureForPage !== 'function') return true;

    this._bootHistoryActivityShellReadyPromise = Promise.resolve()
      .then(() => ScriptLoader.ensureForPage('page-activities'))
      .then(() => {
        if (this.currentPage !== 'page-activities' || this._bootHistoryTargetPageId !== 'page-activities') return;
        try { this._applyActivityUrlFilters?.({ replace: true }); } catch (_) {}
        this._finishActivityBootHistoryShellFirstPaint?.();
      })
      .catch(err => {
        console.warn('[Boot] activity history shell preparation failed:', err && err.message || err);
      })
      .finally(() => {
        this._bootHistoryActivityShellReadyPromise = null;
      });
    return true;
  },

  _getBootHistoryRoute() {
    try {
      const flags = this._getHistoryRouteFlags();
      if (!flags.bootIntegration || !flags.parseRead) return null;
      return this._readCurrentHistoryRoute();
    } catch (_) {
      return null;
    }
  },

  _restoreGithubSpaRedirect() {
    try {
      const url = new URL(window.location.href);
      const raw = String(url.searchParams.get('_spa_redirect') || '').trim();
      if (!raw || raw.charAt(0) !== '/' || raw.startsWith('//')) return false;
      const target = new URL(raw, window.location.origin);
      if (target.origin !== window.location.origin) return false;
      const intent = this._resolveRouteIntent?.({ skipState: true, loc: target }) || { pageId: 'page-home', id: null };
      history.replaceState({
        source: 'sportshub',
        pageId: intent.pageId || 'page-home',
        ...(intent.id ? { id: intent.id } : {}),
      }, '', target.pathname + (target.search || '') + (target.hash || ''));
      return true;
    } catch (err) {
      console.warn('[HistoryRoute] restore _spa_redirect failed:', err && err.message || err);
      return false;
    }
  },

  _setPendingDeepLinkFromHistoryRoute(route) {
    try {
      if (!route?.id) return false;
      if (route.kind === 'eventDetail') {
        sessionStorage.setItem('_pendingDeepEvent', route.id);
        return true;
      }
      if (route.kind === 'teamDetail') {
        sessionStorage.setItem('_pendingDeepTeam', route.id);
        return true;
      }
      if (route.kind === 'tournamentDetail') {
        sessionStorage.setItem('_pendingDeepTournament', route.id);
        return true;
      }
      if (route.kind === 'userCard') {
        sessionStorage.setItem('_pendingDeepProfile', route.id);
        return true;
      }
    } catch (_) {}
    return false;
  },

  _primeBootHistoryDeepLink() {
    try {
      const route = this._getBootHistoryRoute();
      if (!route || route.kind === 'page' || route.kind === 'page-home') return null;

      if (this._hasLegacyRouteSignal()) {
        console.warn('[HistoryRoute] legacy query/hash route takes priority over clean path:', route);
        return null;
      }

      if (this._setPendingDeepLinkFromHistoryRoute(route)) {
        window._bootHistoryDetailRoute = route;
        return route;
      }
    } catch (err) {
      console.warn('[HistoryRoute] prime deep link failed:', err && err.message || err);
    }
    return null;
  },

  _primeBootHistoryRoute() {
    try {
      if (typeof this._getPendingDeepLink === 'function' && this._getPendingDeepLink()) return '';
      if (this._getBootHashPageId()) return '';
      const route = this._getBootHistoryRoute();
      const pageId = route?.kind === 'page' ? this._resolveBootPageId(route.pageId) : '';
      if (!this._isBootHistoryShellPage(pageId)) return '';

      this._bootHistoryTargetPageId = pageId;
      if (pageId === 'page-activities') this._captureBootActivityFilterSearch?.();
      window._bootHistoryTargetPageId = pageId;
      window._bootHistoryNavPending = true;
      window._bootHistoryNavCompleted = false;
      this.currentPage = pageId;
      this._userIntendedPage = pageId;
      window._bootTargetPageId = pageId;
      this._syncBottomTabForPage(pageId);
      document.documentElement.setAttribute('data-boot-target-page', pageId);
      console.log('[Boot] primed history route:', pageId);
      return pageId;
    } catch (err) {
      console.warn('[Boot] prime history route failed:', err && err.message || err);
      return '';
    }
  },

  _primeBootHashRoute() {
    try {
      if (typeof this._getPendingDeepLink === 'function' && this._getPendingDeepLink()) return '';
      const pageId = this._getBootHashPageId();
      if (!this._isBootHashShellPage(pageId)) return '';

      this._bootHashTargetPageId = pageId;
      this.currentPage = pageId;
      this._userIntendedPage = pageId;
      window._bootTargetPageId = pageId;
      this._syncBottomTabForPage(pageId);
      document.documentElement.setAttribute('data-boot-target-page', pageId);
      console.log('[Boot] primed hash route:', pageId);
      return pageId;
    } catch (err) {
      console.warn('[Boot] prime hash route failed:', err && err.message || err);
      return '';
    }
  },

  _activateBootHashShell(pageId = this._bootHashTargetPageId) {
    try {
      if (!this._isBootHashShellPage(pageId)) return false;
      const target = document.getElementById(pageId);
      if (!target) return false;

      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      target.classList.add('active');
      if (pageId !== 'page-home') {
        document.getElementById('page-home')?.classList.add('home-paused');
      }

      this.currentPage = pageId;
      this._userIntendedPage = pageId;
      this._bootHashShellActivated = true;
      window._bootHashNavCompleted = true;
      this._syncBottomTabForPage(pageId);
      return true;
    } catch (err) {
      console.warn('[Boot] activate hash shell failed:', err && err.message || err);
      return false;
    }
  },

  _activateBootHistoryShell(pageId = this._bootHistoryTargetPageId) {
    try {
      if (!this._isBootHistoryShellPage(pageId)) return false;
      const target = document.getElementById(pageId);
      if (!target) return false;

      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      target.classList.add('active');
      if (pageId !== 'page-home') {
        document.getElementById('page-home')?.classList.add('home-paused');
      }

      this.currentPage = pageId;
      this._userIntendedPage = pageId;
      this._bootHistoryShellActivated = true;
      this._syncBottomTabForPage(pageId);
      if (pageId === 'page-activities') {
        this._prepareActivityBootHistoryShell?.();
      }
      return true;
    } catch (err) {
      console.warn('[Boot] activate history shell failed:', err && err.message || err);
      return false;
    }
  },

  _isProtectedBootRestoreRoute(pageId) {
    if (!pageId || pageId === 'page-home' || pageId === 'page-temp-participant-report') return false;
    if (typeof this._findDrawerMenuItem === 'function') {
      const drawerItem = this._findDrawerMenuItem(pageId);
      if (drawerItem && (drawerItem.permissionCode || drawerItem.minRole)) return true;
    }
    const pageEl = document.getElementById(pageId);
    const minRole = String(pageEl?.dataset?.minRole || '').trim();
    return !!minRole && minRole !== 'user';
  },

  _deferProtectedBootRoute(pageId) {
    if (!pageId) return;
    this._pendingProtectedBootRoute = {
      pageId,
      queuedAt: Date.now(),
    };
  },

  _clearPendingProtectedBootRoute() {
    this._pendingProtectedBootRoute = null;
    this._pendingProtectedBootRoutePromise = null;
  },

  _replaceRouteHash(pageId) {
    if (pageId && typeof this._setRouteUrl === 'function') {
      this._setRouteUrl(pageId, { mode: 'replace' });
      return;
    }
    try {
      const url = new URL(window.location.href);
      url.hash = '';
      history.replaceState(this._buildRouteStateForCurrentPage?.(pageId || this.currentPage) || { source: 'sportshub', pageId: pageId || this.currentPage || 'page-home' }, '', url.pathname + (url.search || ''));
    } catch (_) {}
  },

  async _flushPendingProtectedBootRoute(options = {}) {
    const pending = this._pendingProtectedBootRoute;
    // 2026-04-27：no-pending 早退（避免印 15+ 次無意義 log，每次 ~5-20ms console.log overhead）
    if (!pending?.pageId) return false;
    console.log('[Boot] flushPendingProtectedBootRoute called, pending=',
      pending.pageId, 'currentPage=', this.currentPage);
    if (this._pendingProtectedBootRoutePromise) {
      console.log('[Boot] flush already in progress, returning existing promise');
      return await this._pendingProtectedBootRoutePromise;
    }

    // 2026-04-19 fix + 2026-04-20 強化：若用戶已主動導航到其他頁面，取消 pending
    // 優先檢查 _userIntendedPage（showPage 入口立刻更新），解決 _activatePage async 尚未完成的 race condition
    const effectivePage = this._userIntendedPage || this.currentPage;
    if (effectivePage
      && effectivePage !== 'page-home'
      && effectivePage !== pending.pageId) {
      console.log('[Boot] user intended page =', effectivePage, '— cancelling pending boot route:', pending.pageId);
      this._clearPendingProtectedBootRoute();
      return false;
    }

    const pageId = pending.pageId;
    const skipEnsureCloudReady = options.skipEnsureCloudReady === true;
    let restorePromise = null;
    restorePromise = (async () => {
      try {
        if (!skipEnsureCloudReady && this._pageNeedsCloud(pageId) && typeof this.ensureCloudReady === 'function') {
          try {
            await _withSportHubTimeout(
              this.ensureCloudReady({ reason: `restore:${pageId}` }),
              this._routeCloudTimeoutMs,
              'route-step-timeout',
              `Route step timeout (restore-cloud:${pageId})`
            );
          } catch (err) {
            console.warn(`[Boot] protected route cloud restore failed for ${pageId}:`, err);
          }
        }

        if (typeof FirebaseService !== 'undefined'
          && typeof FirebaseService._startAuthDependentWork === 'function') {
          try {
            await Promise.race([
              Promise.resolve(FirebaseService._startAuthDependentWork()),
              new Promise(resolve => setTimeout(resolve, 5000)),
            ]);
          } catch (err) {
            console.warn(`[Boot] protected route access sync failed for ${pageId}:`, err);
          }
        }

        // 2026-04-19 補強 + 2026-04-20 強化：await 期間用戶可能已點其他頁
        // 優先檢查 _userIntendedPage（showPage 入口立刻設，不等 _activatePage）
        const effectivePageAfter = this._userIntendedPage || this.currentPage;
        console.log('[Boot] flush after await, intended=', this._userIntendedPage,
          'currentPage=', this.currentPage, 'target=', pageId);
        if (effectivePageAfter
          && effectivePageAfter !== 'page-home'
          && effectivePageAfter !== pageId) {
          console.log('[Boot] user intended', effectivePageAfter,
            'during flush await — cancelling showPage to', pageId);
          this._clearPendingProtectedBootRoute();
          return false;
        }

        console.log('[Boot] flush proceeding to showPage(', pageId, ')');
        const result = await this.showPage(pageId, {
          resetHistory: true,
          suppressAccessDeniedToast: true,
          suppressLoginToast: true,
          fromBootFlush: true,
        });

        if (result?.ok) {
          this._clearPendingProtectedBootRoute();
          return true;
        }

        // 2026-04-19 補強：flush 失敗時，若用戶已主動導航到其他活躍頁面，
        // 不再強制拉回 home（例如詳情頁）。僅清 hash，保留用戶當前頁
        if (this.currentPage
          && this.currentPage !== 'page-home'
          && this.currentPage !== pageId) {
          console.log('[Boot] flush failed but user on', this.currentPage, '— keeping current page');
          this._clearPendingProtectedBootRoute();
          return false;
        }
        this._replaceRouteHash('page-home');
        if (this.currentPage !== 'page-home') {
          await this.showPage('page-home', {
            bypassRestrictionGuard: true,
            resetHistory: true,
          });
        }
        this._clearPendingProtectedBootRoute();
        return false;
      } finally {
        if (this._pendingProtectedBootRoutePromise === restorePromise) {
          this._pendingProtectedBootRoutePromise = null;
        }
      }
    })();

    this._pendingProtectedBootRoutePromise = restorePromise;
    return await restorePromise;
  },

  async ensureCloudReady(options = {}) {
    const { reason = 'unknown' } = options;
    if (this._cloudReady) return true;
    if (this._cloudReadyPromise) return await this._cloudReadyPromise;

    console.log(`[Cloud] ensureCloudReady start: ${reason}`);
    this._cloudReadyError = null;

    const bootPromise = (async () => {
      await _loadCDNScripts();
      if (!initFirebaseApp()) {
        throw new Error('FIREBASE_APP_INIT_FAILED');
      }
      this.startPmThreadListener?.();

      if (typeof liff !== 'undefined') {
        LineAuth._ready = false;
        LineAuth._initError = null;
      }

      // LIFF init 與 Firebase init 並行，避免 LIFF 阻塞資料載入（guest deep link 需要快速載入事件）
      const liffReadyPromise = (typeof liff !== 'undefined')
        ? LineAuth.initSDK().then(() => {
            console.log('[Cloud] LIFF SDK ready');
            if (LineAuth.hasLiffSession()) {
              // Tier 1：正常 LIFF session
              LineAuth.restoreCachedProfile();
              if (LineAuth._profile) {
                try { this.renderLoginUI(); } catch (_) {}
              }
            } else {

        // v8 Blocker 3：若 LIFF SDK 從未載入（CDN 封鎖 / adblock）、標記 ready + _initError

        : Promise.resolve().then(() => {

        this._instantDeepLinkEventId = null;

          try {

            if (typeof FirebaseService !== 'undefined' && FirebaseService.ensureCollectionsForPage) {
              await FirebaseService.ensureCollectionsForPage(pageId, { skipRealtimeStart: true });
            }

            // 2. 立即啟動 realtime listener（registrations + attendanceRecords）
            //    不走 schedulePageScopedRealtimeForPage 的 350ms 延遲
            // 3. 用 SDK 重新取得完整事件資料（覆蓋 REST 簡略版）
            if (typeof db !== 'undefined') {
              try {
                // 先嘗試 doc path，再嘗試 id 欄位查詢
                let doc = await db.collection('events').doc(sdkEventId).get();
                if (!doc.exists) {
                  const snap = await db.collection('events').where('id', '==', sdkEventId).limit(1).get();
                  if (!snap.empty) doc = snap.docs[0];
                }
                if (doc.exists) {
                  const fullEvent = { ...doc.data(), _docId: doc.id };
                  if (!fullEvent.id) fullEvent.id = doc.id;
                  const cache = FirebaseService._cache.events;

              } catch (_) {}
            }

            // 4. 等待 registrations 首次 onSnapshot（最多 3 秒）
            //    已登入才等（guest 的 listener 不會啟動）
            const isGuest = !(typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn());
            const getSignupUidForDeepLinkRefresh = () => {
              const authUid = (typeof auth !== 'undefined' && auth?.currentUser?.uid)
                ? auth.currentUser.uid
                : '';
              const apiUid = (typeof ApiService !== 'undefined' && typeof ApiService.getCurrentUser === 'function')
                ? ApiService.getCurrentUser()?.uid
                : '';
              return String(this._getCurrentSignupRegistrationUid?.() || authUid || apiUid || '').trim();
            };
            if (!isGuest
              && typeof FirebaseService !== 'undefined'
              && typeof FirebaseService.ensureAuthReadyForWrite === 'function') {
              const signupUid = getSignupUidForDeepLinkRefresh();
              if (signupUid) {
                await new Promise(resolve => {
                  const timer = setTimeout(() => resolve(false), 3500);
                  Promise.resolve(FirebaseService.ensureAuthReadyForWrite(signupUid))
                    .then(
                      value => { clearTimeout(timer); resolve(value); },
                      () => { clearTimeout(timer); resolve(false); }
                    );
                });
              }
            }

            if (typeof FirebaseService !== 'undefined' && FirebaseService._startPageScopedRealtimeForPage) {
              FirebaseService._startPageScopedRealtimeForPage(pageId);
            }

            if (!isGuest) {
              await new Promise(resolve => {
                const check = () => {
                  const event = (typeof ApiService !== 'undefined' && typeof ApiService.getEvent === 'function')
                    ? ApiService.getEvent(sdkEventId)
                    : null;
                  if (event && this._hasCurrentEventSignupRegistrationServerProof?.(event)) return true;
                  const uid = getSignupUidForDeepLinkRefresh();
                  return !!(uid
                    && typeof FirebaseService !== 'undefined'
                    && FirebaseService._registrationsServerSnapshotReceived
                    && String(FirebaseService._registrationListenerKey || '') === `user:${uid}`);
                };
                if (check()) { resolve(); return; }
                const interval = setInterval(() => { if (check()) { clearInterval(interval); resolve(); } }, 100);
                setTimeout(() => { clearInterval(interval); resolve(); }, 3000);
              });
            }

            if (this.currentPage !== pageId) return;

            // 5. 重新渲染（此時 cache 已有完整資料）
            await this.showEventDetail(sdkEventId, { allowGuest: isGuest });
            console.log('[DeepLink] SDK background refresh complete for', sdkEventId);
          } catch (err) {
            console.warn('[DeepLink] SDK background refresh failed:', err);
          }
        })();
      }

      return true;
    })();

    this._cloudReadyPromise = bootPromise;

    try {
      return await bootPromise;
    } catch (err) {
      this._cloudReadyError = err;
      console.error(`[Cloud] ensureCloudReady failed (${reason}):`, err?.message || err);
      _dismissBootOverlay('Cloud init failed');
      // SWR：雲端啟動失敗，進度條改為離線指示（同時清 cold-boot 強化類）
      try {
        var _sb = document.getElementById('swr-bar');
        if (_sb) { _sb.classList.remove('active', 'cold-boot'); }
      } catch (_) {}
      try { this.showToast('Cloud init failed. Please retry.'); } catch (_) {}
      try {
        if (typeof this.bindLineLogin === 'function') {
          await this.bindLineLogin();
        }
      } catch (_) {}
      void this._flushPendingProtectedBootRoute({ skipEnsureCloudReady: true });
      // v8 Blocker 1：pending action 優先於 deep link（避免雙開 showEventDetail）
      if (typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn() && this._getPendingAuthAction()) {
        void this._resumePendingAuthAction();
      } else {
        void this._tryOpenPendingDeepLink();
      }
      throw err;
    } finally {
      if (!this._cloudReady) {
        this._cloudReadyPromise = null;
      }
    }
  },
};

const _dynamicScriptPromises = {};
let _cdnScriptsPromise = null;
const FIREBASE_SDK_URLS = Object.freeze({
  app: 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js',
  firestore: 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js',
  auth: 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js',
  storage: 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js',
  functions: 'https://www.gstatic.com/firebasejs/10.14.1/firebase-functions-compat.js',
  liff: 'https://static.line-scdn.net/liff/edge/2/sdk.js',
});

function _loadScript(src) {
  if (_dynamicScriptPromises[src]) return _dynamicScriptPromises[src];

  const timeoutMs = Number(App?._scriptLoadTimeoutMs || 12000);
  const bindLoadPromise = (scriptEl, options = {}) => {
    const { removeOnTimeout = false } = options;
    return _withSportHubTimeout(
      new Promise((resolve, reject) => {
        const cleanup = () => {
          scriptEl.removeEventListener('load', onLoad);
          scriptEl.removeEventListener('error', onError);
        };
        const onLoad = () => {
          cleanup();
          scriptEl.dataset.loaded = 'true';
          resolve();
        };
        const onError = () => {
          cleanup();
          reject(new Error('Script load failed: ' + src));
        };

        scriptEl.addEventListener('load', onLoad, { once: true });
        scriptEl.addEventListener('error', onError, { once: true });
      }),
      timeoutMs,
      'script-load-timeout',
      'Script load timeout: ' + src
    ).catch(err => {
      if (err?.code === 'script-load-timeout' && removeOnTimeout) {
        try { scriptEl.remove(); } catch (_) {}
      }
      throw err;
    });
  };

  const existing = document.querySelector(`script[src="${src}"]`);
  if (existing) {
    if (existing.dataset.loaded === 'true') {
      return Promise.resolve();
    }
    _dynamicScriptPromises[src] = bindLoadPromise(existing).catch(err => {
      delete _dynamicScriptPromises[src];
      throw err;
    });
    return _dynamicScriptPromises[src];
  }

  const s = document.createElement('script');
  s.src = src;
  s.async = true;
  // 跨域 script 設定 CORS anonymous，匹配 <link rel="preload" crossorigin> 避免重複下載
  try { if (new URL(src).origin !== location.origin) s.crossOrigin = 'anonymous'; } catch (_) {}
  document.head.appendChild(s);

  _dynamicScriptPromises[src] = bindLoadPromise(s, { removeOnTimeout: true }).catch(err => {
    delete _dynamicScriptPromises[src];
    throw err;
  });
  return _dynamicScriptPromises[src];
}

async function ensureFirebaseStorageSdk() {
  await _loadCDNScripts();
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
  if ((!firebase.apps || firebase.apps.length === 0) && typeof initFirebaseApp === 'function') {
    initFirebaseApp();
  }
  if (typeof firebase.storage !== 'function') {
    await _loadScript(FIREBASE_SDK_URLS.storage);
  }
  if (typeof initFirebaseStorageServices === 'function') {
    initFirebaseStorageServices();
  }
  if (typeof storage === 'undefined' || (!storage && !uploadStorage)) {
    throw new Error('Storage SDK not initialized');
  }
  return uploadStorage || storage;
}

async function ensureFirebaseFunctionsSdk(region = 'asia-east1') {
  await _loadCDNScripts();
  if (typeof firebase === 'undefined' || !firebase.app) {
    throw new Error('Firebase SDK not loaded');
  }
  if ((!firebase.apps || firebase.apps.length === 0) && typeof initFirebaseApp === 'function') {
    initFirebaseApp();
  }
  if (typeof firebase.app().functions !== 'function') {
    await _loadScript(FIREBASE_SDK_URLS.functions);
  }
  return firebase.app().functions(region);
}

async function _loadCDNScriptsOnce() {
  await _loadScript(FIREBASE_SDK_URLS.app);
  await Promise.all([
    _loadScript(FIREBASE_SDK_URLS.firestore),
    _loadScript(FIREBASE_SDK_URLS.auth),
    _loadScript(FIREBASE_SDK_URLS.liff),
  ]);
}

async function _loadCDNScripts() {
  if (_cdnScriptsPromise) return await _cdnScriptsPromise;

  _cdnScriptsPromise = (async () => {
    try {
      await _loadCDNScriptsOnce();
    } catch (firstErr) {
      // 首次超時 → 自動重試一次（瀏覽器已部分快取，第二次通常更快）
      console.warn('[CDN] 首次載入失敗，自動重試:', firstErr?.message || firstErr);
      const origTimeout = App._scriptLoadTimeoutMs;
      App._scriptLoadTimeoutMs = 10000; // 重試用較短超時（瀏覽器有快取）
      try {
        await _loadCDNScriptsOnce();
      } finally {
        App._scriptLoadTimeoutMs = origTimeout;
      }
    }
    console.log('[CDN] Firebase + LIFF SDK loaded');
    return true;
  })();

  try {
    return await _cdnScriptsPromise;
  } catch (err) {
    _cdnScriptsPromise = null;
    throw err;
  }
}

      }
    } catch (_) {}

    if (_homeHasContent) {
      _dismissBootOverlay('Phase 3 快取命中');
      // 熱啟動：swr-bar 維持低調（2px 淡色），不打擾已看到內容的用戶
      var _swrBar = document.getElementById('swr-bar');
      if (_swrBar) _swrBar.classList.add('active');
      // 2026-04-20：熱啟動隱藏「冷啟動載入指示器」（用戶看快取資料，不需提示）
      try {
        var _loadingEl = document.getElementById('hot-events-loading');
        if (_loadingEl) _loadingEl.style.display = 'none';
      } catch (_) {}
    } else {
      // 快取未命中：顯示骨架佔位取代阻塞式 overlay
      _dismissBootOverlay('Phase 3 骨架模式');
      // 冷啟動：swr-bar 強化顯示（3px + 微光），讓用戶明確感知背景仍在載入
      var _swrBar2 = document.getElementById('swr-bar');
      if (_swrBar2) _swrBar2.classList.add('active', 'cold-boot');
      // 2026-04-20：冷啟動載入指示器 (#hot-events-loading) 由 home.html 預設提供
      //             水平捲動骨架 (.skeleton.skeleton-card) 也由 home.html 預設提供
      //             此處不需注入 DOM
      console.log('[Boot] 快取未命中，冷啟動載入指示器 + swr-bar 強化');
    }
    console.log('[Boot] Phase 3 完成');
  } catch (e) {
    console.warn('[Boot] Phase 3 完成處理失敗:', e && e.message || e);
  }

  // ── Phase 1 完成後補跑一次 renderAll + 動態頁面事件綁定（非阻塞）──
  htmlReady.then(async function() {
    try {
      App.renderAll();
      console.log('[Boot] Phase 1 後補跑 renderAll 完成');
    } catch (e) {
      console.warn('[Boot] Phase 1 完成後 renderAll 失敗:', e && e.message || e);
    }
    try {
      App._bindPageElements();
      console.log('[Boot] Phase 1 後補跑 _bindPageElements 完成');
    } catch (e) {
      console.warn('[Boot] _bindPageElements 失敗:', e && e.message || e);
    }
    // HTML ready + REST fetch → 嘗試即時渲染活動頁
    if (App._deepLinkRestFetch && !App._deepLinkRendered) {
      try {
        await App._tryInstantEventDeepLink();
      } catch (e) {
        console.warn('[Boot] instant deep link failed:', e && e.message || e);
      }
    }
  });

  // Phase 4: deep link boots cloud immediately; normal home boot defers until first paint.
  {
    const pendingDeepLink = App._getPendingDeepLink();
    if (pendingDeepLink) {
      console.log('[Boot] Phase 4: immediate cloud init for deep link');
      void App.ensureCloudReady({ reason: 'boot-deep-link' }).catch(() => {});
    } else {
      console.log('[Boot] Phase 4: schedule deferred cloud init');
      App._scheduleCloudBoot('boot-idle');
    }
  }

  // Global unhandled rejection → errorLog（過濾第三方 SDK 雜訊，但記錄嚴重錯誤）
  window.addEventListener('unhandledrejection', (event) => {
    const msg = (event.reason?.message || '').toLowerCase();
    if (typeof ApiService !== 'undefined' && ApiService._isFirestoreIndexedDbTransientError?.(event.reason)) {
      console.warn('[unhandledrejection] Firestore IndexedDB transient suppressed:', event.reason?.message || event.reason);
      if (ApiService._errorLogReady) {
        ApiService._writeErrorLog('firestore-indexeddb-transient', event.reason);
      }
      if (typeof event.preventDefault === 'function') event.preventDefault();
      return;
    }
    // Firebase SDK INTERNAL ASSERTION FAILED：記錄但不報錯（已知 IndexedDB 問題）
    if (msg.includes('assertion') && (msg.includes('firebase') || msg.includes('firestore'))) {
      console.error('[SDK] Firebase assertion error (IndexedDB issue):', event.reason?.message);
      return;
    }
    if (!ApiService._errorLogReady) return;
    // permission-denied 不靜默：記錄並提示用戶
    const code = (event.reason?.code || '').toLowerCase();
    if (code === 'permission-denied') {
      console.error('[unhandledrejection] Firestore permission-denied:', event.reason?.message);
      if (typeof App !== 'undefined' && App.showToast) {
        App.showToast('操作失敗：權限不足\n請清除瀏覽器緩存後重新登入\n若仍異常請聯繫管理員');
      }
      ApiService._writeErrorLog('permission-denied', event.reason);
      return;
    }
    if (msg.includes('liff') || msg.includes('firebase') || msg.includes('firestore') || msg.includes('chunkloaderror')) return;
    ApiService._writeErrorLog('unhandledrejection', event.reason);
  });

  // 嘗試立即開啟 deep link（其餘會由 guard 持續輪詢）
  void App._tryOpenPendingDeepLink();
  try {
    if (!App._getPendingDeepLink()) {
      const bootUrl = new URL(window.location.href);
      // 2026-04-25 Bug fix：?rid= 只在 hash 為空或本來就是 temp report 時才強制路由
      // 防止「進 temp report 後導航到其他頁 → refresh 又被 ?rid 拉回 temp report」
      const _hashOnUrl = location.hash.replace(/^#/, '');
      const _ridParam = bootUrl.searchParams.get('rid');
      const rawPageId = (_ridParam && (!_hashOnUrl || _hashOnUrl === 'page-temp-participant-report'))
        ? 'page-temp-participant-report'
        : _hashOnUrl;
      const historyPageId = (!_hashOnUrl && !_ridParam) ? String(App._bootHistoryTargetPageId || '') : '';
      const bootPageId = App._resolveBootPageId(rawPageId || historyPageId);
      const isPrimedBootHashShell = !!(bootPageId
        && bootPageId === App.currentPage
        && App._bootHashTargetPageId === bootPageId);
      const isPrimedBootHistoryShell = !!(bootPageId
        && bootPageId === App.currentPage
        && App._bootHistoryTargetPageId === bootPageId);
      const dismissBootNavDone = function(reason) {
        if (isPrimedBootHistoryShell) {
          try { _dismissBootOverlayAfterHistoryNav(reason || 'history-show-done'); } catch (_) {}
        } else {
          try { _dismissBootOverlayAfterHashNav(reason || 'hash-show-done'); } catch (_) {}
        }
      };
      if (bootPageId && (bootPageId !== App.currentPage || isPrimedBootHashShell || isPrimedBootHistoryShell)) {
        // 2026-04-27：navigation 完成後 dismiss boot overlay、解除「先閃首頁」
        if (!isPrimedBootHashShell && !isPrimedBootHistoryShell && App._isProtectedBootRestoreRoute(bootPageId)) {
          App._deferProtectedBootRoute(bootPageId);
          App._flushPendingProtectedBootRoute().finally(() => {
            try { _dismissBootOverlayAfterHashNav('protected-flush-done'); } catch (_) {}
          });
        } else {
          const bootShowOptions = (isPrimedBootHashShell || isPrimedBootHistoryShell)
            ? { resetHistory: true, suppressHashSync: true, resetScroll: false, historyRouteSource: isPrimedBootHistoryShell ? 'path' : undefined }
            : undefined;
          App.showPage(bootPageId, bootShowOptions).finally(() => {
            dismissBootNavDone();
          });
        }
      } else {
        // 沒有 navigation 需要、清除 hash nav 守衛（避免 overlay 永遠卡住）
        window._bootHashNavCompleted = true;
        window._bootHistoryNavCompleted = true;
        window._bootHistoryNavPending = false;
      }
    } else {
      // 有 deep link 待處理、由 _clearPendingDeepLink 觸發 dismiss
      window._bootHashNavCompleted = true;
      window._bootHistoryNavCompleted = true;
      window._bootHistoryNavPending = false;
    }
  } catch (_) {
    // boot 流程出錯、清除守衛避免 overlay 卡住
    window._bootHashNavCompleted = true;
    window._bootHistoryNavCompleted = true;
    window._bootHistoryNavPending = false;
  }

  // 定時任務（全部 try-catch 保護）
  // Hash 路由：瀏覽器返回/前進鍵同步頁面
  // pageId !== App.currentPage 條件防止 showPage() 設 hash 後再次觸發無窮迴圈
  try {
    window.addEventListener('hashchange', () => {
      // Phase 6 D10 dedupe:popstate handler 已處理就跳過,避免雙觸發 showPage
      if (window._suppressNextHashchange) {
        window._suppressNextHashchange = false;
        return;
      }
      const pageId = location.hash.replace(/^#/, '');
      // hashchange 不套用 _resolveBootPageId，因為正常導航（showTeamDetail 等）
      // 會在渲染完成後設定 hash，此時不應被重導回列表頁
      const canResolvePage = pageId
        && (document.getElementById(pageId)
          || (typeof PageLoader !== 'undefined' && PageLoader._pageFileMap && PageLoader._pageFileMap[pageId]));
      if (canResolvePage && pageId !== App.currentPage) {
        // 2026-04-19 UX 調整：移除 hash 導航的 _pendingFirstLogin 守衛，允許自由瀏覽。
        // 寫入類動作由對應函式的 _requireProfileComplete() 守衛負責攔截。
        App.showPage(pageId);
      }
    });
  } catch (e) {}

  // Phase 6:popstate handler — Browser Back / Forward 協調
  // 詳:docs/history-api-dual-route-plan.md §8.9.1 + decisions D6/D10-D14
  try {
    window.addEventListener('popstate', async (event) => {
      const flags = App._getHistoryRouteFlags?.() || {};
      if (!flags.popstateTakeover) return;  // flag 防護:Commit B 階段為 false 即不做事

      const seq = ++App._popstateRequestSeq;

      // D10 dedupe:同步階段先 set 攔截緊接的 hashchange
      window._suppressNextHashchange = true;
      setTimeout(() => { window._suppressNextHashchange = false; }, 50);

      try {
        const stateValid = event.state && event.state.source === 'sportshub';

        // D11 sentinel 攔截:防退出 Mini App
        if (stateValid && event.state.sentinel === true) {
          const requestedFallback = event.state.fallbackPageId || 'page-home';
          const isDetailPage = /-detail$/.test(requestedFallback);
          const fallback = isDetailPage ? 'page-home' : requestedFallback;
          await App.showPage(fallback, {
            bypassPageLock: true,
            allowGuest: true,
            skipPageHistory: true,
            suppressHashSync: true,
          });
          if (seq !== App._popstateRequestSeq) return;
          history.pushState({ ...event.state, fallbackPageId: fallback }, '', window.location.href);
          return;
        }

        // D13 fallback chain(走共用 helper,順序遵循 §5.1)
        const intent = App._resolveRouteIntent({ state: event.state });
        const targetPageId = intent.pageId;
        const targetId = intent.id;

        const detailOptions = {
          bypassPageLock: true,
          allowGuest: true,
          skipPageHistory: true,
          suppressHashSync: true,
        };

        if (targetPageId === 'page-activity-detail' && targetId) {
          await App.showEventDetail(targetId, detailOptions);
        } else if (targetPageId === 'page-team-detail' && targetId) {
          await App.showTeamDetail(targetId, detailOptions);
        } else if (targetPageId === 'page-tournament-detail' && targetId) {
          await App.showTournamentDetail(targetId, detailOptions);
        } else if (targetPageId === 'page-user-card' && targetId) {
          const targetUser = App._findUserByUid?.(targetId);
          const targetName = targetUser?.displayName || targetUser?.name || targetId;
          await App.showUserProfile?.(targetName, { ...detailOptions, uid: targetId });
        } else {
          await App.showPage(targetPageId, {
            bypassPageLock: true,
            allowGuest: true,
            skipPageHistory: true,
            suppressHashSync: true,
          });
        }

        if (seq !== App._popstateRequestSeq) return;
      } catch (err) {
        console.error('[Popstate] handler error:', err);
      }
    });
  } catch (e) {}
  try { App._syncBootBrandToLocal?.(); } catch (e) {}
  try { App._autoExpireAds(); } catch (e) {}
  setInterval(() => { try { App._autoExpireAds(); } catch (e) {} }, 60000);
  try { Promise.resolve(App._processScheduledMessages()).catch(() => {}); } catch (e) {}
  setInterval(() => { try { Promise.resolve(App._processScheduledMessages()).catch(() => {}); } catch (e) {} }, 60000);
  try { App._processEventReminders(); } catch (e) {}
  setInterval(() => { try { App._processEventReminders(); } catch (e) {} }, 300000);

  // 2026-04-26：boot 完成、主動清 boot watchdog（避免 8 秒後誤觸 reload）
  try {
    if (window._bootWatchdogTimer) {
      clearTimeout(window._bootWatchdogTimer);
      window._bootWatchdogTimer = null;
    }
    sessionStorage.removeItem('_bootWatchdog');
  } catch (e) {}

  window._appInitializing = false;
  console.log('[Boot] 初始化流程結束');
});

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (window.App && typeof window.App._handleSwControllerChange === 'function') {
          window.App._handleSwControllerChange();
          return;
        }
        if (!window._swReloading && !window._appInitializing && !window._swJustCleared) {
          window._swReloading = true; location.reload();
        }
      });
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(function(){});
      });
    }
  </script>
  <!-- 腳本載入失敗時的安全恢復機制 -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.indexOf(location.origin) === 0) {
        console.error('[Boot] Script failed:', e.target.src);
        var b = document.getElementById('_recovery_btn');
        if (!b) {
          b = document.createElement('button');
          b.id = '_recovery_btn';
          b.textContent = '腳本載入失敗，點我清快取後重整';
          b.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;padding:1rem 2rem;font-size:1rem;background:#dc2626;color:#fff;border:none;border-radius:8px;cursor:pointer';
          b.onclick = function() {
            if ('caches' in window) caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
            if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(w){w.unregister()})});
            setTimeout(function(){ location.reload(true); }, 300);
          };
          document.body.appendChild(b);
        }
      }
    }, true);
  </script>
  <!-- 開機看門狗：清快取後 8 秒內未完成初始化則自動重載（最多 2 次） -->
  <!-- 2026-04-26：加 _contentReady / App._cloudReady 檢查、避免已完成 boot 後仍誤觸 reload -->
  <!-- iOS Safari 上連線不穩時會踩到此 watchdog、進 admin-users 後 8 秒被強制 reload 形成迴圈 -->
  <script>
  (function(){
    try{
      var w=sessionStorage.getItem('_bootWatchdog');
      if(!w)return;
      var remain=parseInt(w)||0;
      if(remain<=0){sessionStorage.removeItem('_bootWatchdog');return;}
      window._bootWatchdogTimer=setTimeout(function(){
        // boot 已完成（首頁有內容 / cloud ready）→ 不 reload、清 watchdog
        if(window._contentReady||(typeof App!=='undefined'&&App._cloudReady)){
          sessionStorage.removeItem('_bootWatchdog');
          window._bootWatchdogTimer=null;
          return;
        }
        sessionStorage.setItem('_bootWatchdog',String(remain-1));
        location.reload();
      },8000);
    }catch(e){}
  })();
  </script>
