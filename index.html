  <!-- 全局圖片預解碼淡入：load 後呼叫 decode()，解碼完成才顯示（無閃爍） -->
  <script>
  document.addEventListener('load', function(e) {
    if (e.target.tagName !== 'IMG') return;
    var img = e.target;
    if (typeof img.decode === 'function') {
      img.decode().then(function() {
        img.classList.add('img-loaded');
      }).catch(function() {
        img.classList.add('img-loaded');
      });
    } else {
      img.classList.add('img-loaded');
    }
  }, true);
  document.addEventListener('error', function(e) {
    if (e.target.tagName === 'IMG') e.target.classList.add('img-loaded');
  }, true);
  // 頁面已存在的圖片（已完成載入或失敗的）立即標記（不淡入）
  document.querySelectorAll('img').forEach(function(img) {
    if (img.complete) img.classList.add('img-preloaded');
  });
  </script>

  (function(){
    var s=location.search;if(!s)return;
    var keys=['event','team','tournament','profile'];
    var p=new URLSearchParams(s);
    var has=false;for(var i=0;i<keys.length;i++){if(p.get(keys[i])){has=true;break}}

    var hosts=['toosterx.com','www.toosterx.com','msw2004727.github.io','fc-3g8.pages.dev'];
    if(hosts.indexOf(location.hostname)===-1)return;
    // 用 localStorage（跨 LINE 瀏覽器與 Mini App WebView 共享）防止跳轉迴圈
    try{var t=localStorage.getItem('_miniAppBounce');if(t&&Date.now()-parseInt(t)<30000)return;localStorage.setItem('_miniAppBounce',''+Date.now())}catch(e){}
    location.replace('https://miniapp.line.me/2009525300-AuPGQ0sh'+s);
    // [備用] 舊 LIFF 跳轉：location.replace('https://liff.line.me/2009084941-zgn7tQOp'+s);

  <!-- debug=1 時顯示 debug console -->
  <script>
  if(location.search.indexOf('debug=1')!==-1){
    var _dbg=document.createElement('div');
    _dbg.id='_debug';
    _dbg.style.cssText='position:fixed;bottom:84px;right:8px;left:8px;max-width:420px;max-height:40vh;overflow:hidden;display:flex;flex-direction:column;background:rgba(0,0,0,.92);color:#0f0;font:11px/1.5 monospace;padding:8px 10px;z-index:99999;word-break:break-all;border:1px solid #333;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.35)';
    var _dbgLogs=[];
    var _toolbar='<div style="color:#888;border-bottom:1px solid #333;padding-bottom:4px;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-shrink:0">'
      +'<span style="flex:1">== Debug Console ==</span>'
      +'<button id="_dbgCopy" style="background:#1a4d1a;color:#0f0;border:1px solid #0f0;border-radius:4px;padding:3px 8px;font:11px monospace;cursor:pointer">📋 複製</button>'
      +'<button id="_dbgClear" style="background:#4d1a1a;color:#f55;border:1px solid #f55;border-radius:4px;padding:3px 8px;font:11px monospace;cursor:pointer">🗑️ 清</button>'
      +'<button id="_dbgHide" style="background:#333;color:#ccc;border:1px solid #666;border-radius:4px;padding:3px 8px;font:11px monospace;cursor:pointer">✕</button>'
      +'</div>';
    var _dbgBody=document.createElement('div');
    _dbgBody.id='_dbgBody';
    _dbgBody.style.cssText='flex:1;overflow:auto;-webkit-overflow-scrolling:touch';
    _dbg.innerHTML=_toolbar;
    _dbg.appendChild(_dbgBody);
    document.documentElement.appendChild(_dbg);
    function _addDbg(t,a){
      var msg=Array.from(a).map(function(x){try{return typeof x==='object'?JSON.stringify(x):String(x)}catch(e){return String(x)}}).join(' ');
      var line='['+t+'] '+msg;
      _dbgLogs.push(line);
      var d=document.createElement('div');
      d.style.color=t==='error'?'#f55':t==='warn'?'#fa0':'#0f0';
      d.textContent=line;
      _dbgBody.appendChild(d);
      _dbgBody.scrollTop=_dbgBody.scrollHeight;
    }
    var _oL=console.log,_oE=console.error,_oW=console.warn;
    console.log=function(){_oL.apply(console,arguments);_addDbg('log',arguments)};
    console.error=function(){_oE.apply(console,arguments);_addDbg('error',arguments)};
    console.warn=function(){_oW.apply(console,arguments);_addDbg('warn',arguments)};
    window.addEventListener('error',function(e){_addDbg('error',[e.message,e.filename+':'+e.lineno])});
    window.addEventListener('unhandledrejection',function(e){var r=e.reason;var msg='(unknown)';try{if(r instanceof Error){msg=r.message+(r.stack?'\n'+r.stack:'')}else if(typeof r==='object'&&r!==null){msg=JSON.stringify(r)||String(r)}else{msg=String(r)}}catch(x){msg=String(r)}_addDbg('error',['Promise rejected:',msg])});
    // 複製全部 log（跨瀏覽器相容：優先 Clipboard API，fallback execCommand）
    function _dbgCopyAll(){
      var text='== Debug Log ('+new Date().toISOString()+') ==\nUA: '+navigator.userAgent+'\nURL: '+location.href+'\n\n'+_dbgLogs.join('\n');
      var done=function(ok){
        var btn=document.getElementById('_dbgCopy');
        if(btn){var orig=btn.textContent;btn.textContent=ok?'✓ 已複製':'✗ 失敗';setTimeout(function(){btn.textContent=orig},1500)}
      };
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){done(true)}).catch(function(){_fallback()});
      }else{_fallback()}
      function _fallback(){
        try{
          var ta=document.createElement('textarea');
          ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
          document.body.appendChild(ta);ta.select();
          var ok=document.execCommand('copy');
          document.body.removeChild(ta);
          done(ok);
        }catch(e){done(false)}
      }
    }
    document.getElementById('_dbgCopy').addEventListener('click',_dbgCopyAll);
    document.getElementById('_dbgClear').addEventListener('click',function(){_dbgLogs.length=0;_dbgBody.innerHTML=''});
    document.getElementById('_dbgHide').addEventListener('click',function(){_dbg.style.display='none'});

    // === 2026-04-20 深度 scroll 診斷：攔截所有 scroll 歸零動作 ===
    // 用戶回報詳情頁跳頂但 _runPageScrollReset 沒被觸發 → 真兇另有其人
    // 此段 monkey-patch 任何 scroll 設定為 0 的呼叫，印出 stack trace
    try {
      var _lastWinY = window.scrollY || 0;
      window.addEventListener('scroll', function() {
        var y = window.scrollY || window.pageYOffset || 0;
        if (_lastWinY > 50 && y < 5) {
          console.log('[scroll-trace] 🎯 window scrollY jumped', _lastWinY, '→', y,
            '| currentPage:', (window.App && App.currentPage) || '?');
        }
        _lastWinY = y;
      }, { passive: true });

      // Patch window.scrollTo
      var _origScrollTo = window.scrollTo.bind(window);
      window.scrollTo = function() {
        try {
          var toY = 0;
          if (typeof arguments[0] === 'object' && arguments[0] && 'top' in arguments[0]) {
            toY = arguments[0].top;
          } else if (typeof arguments[1] === 'number') {
            toY = arguments[1];
          }
          var currY = window.scrollY || 0;
          if (currY > 50 && toY === 0) {
            var stk = (new Error().stack || '').split('\n').slice(2, 8).map(function(s){return s.trim()}).join(' | ');
            console.log('[scroll-trace] window.scrollTo(0) from', currY, '| stack:', stk);
          }
        } catch (_) {}
        return _origScrollTo.apply(window, arguments);
      };

      // Patch Element.prototype.scrollTop setter
      var _stDesc = Object.getOwnPropertyDescriptor(Element.prototype, 'scrollTop');
      if (_stDesc && _stDesc.set && _stDesc.get) {
        var _origSet = _stDesc.set, _origGet = _stDesc.get;
        Object.defineProperty(Element.prototype, 'scrollTop', {
          get: function() { return _origGet.call(this); },
          set: function(v) {
            try {
              var curr = _origGet.call(this);
              if (v === 0 && curr > 50) {
                var tag = this.id ? '#'+this.id : (this.tagName || '?').toLowerCase();
                var stk = (new Error().stack || '').split('\n').slice(2, 8).map(function(s){return s.trim()}).join(' | ');
                console.log('[scroll-trace] elem.scrollTop=0', tag, 'from', curr, '| stack:', stk);
              }
            } catch (_) {}
            return _origSet.call(this, v);
          },
          configurable: true
        });
      }
    } catch (e) { console.warn('[scroll-trace] init failed', e); }
  }
  </script>

  <script>
    /* 白屏卡住偵測旗標：頁面內容成功渲染後由 navigation.js 設為 true */
    window._contentReady = false;
    /* 開機品牌圖：從 localStorage 讀取管理員設定 */
    (function() {
      try {
        var cfg = JSON.parse(localStorage.getItem('_bootBrand'));
        if (!cfg) return;
        var slot = document.querySelector('.boot-loading__image-slot');
        var brandImg = document.getElementById('boot-loading-brand-img');
        if (cfg.imageUrl && brandImg) {
          var brandPicture = brandImg.closest ? brandImg.closest('picture') : null;
          if (brandPicture) {
            var brandSources = brandPicture.querySelectorAll('source');
            for (var i = 0; i < brandSources.length; i += 1) brandSources[i].remove();
          }
          brandImg.src = cfg.imageUrl;
        }
        if (brandImg) brandImg.style.transform = '';
        if (slot && cfg.bgMode) {
          if (cfg.bgMode === 'dark') slot.style.background = '#1e1e2e';
          else if (cfg.bgMode === 'light') slot.style.background = cfg.bgColor || '#1a1a2e';
          /* auto: 不設 inline style，由 CSS 處理 */
        }
      } catch(_) {}
    })();
    (function () {
      var overlay = document.getElementById('loading-overlay');
      var boot = overlay && overlay.querySelector('[data-boot-loading]');
      if (!overlay || !boot) return;

      var img = document.getElementById('boot-loading-brand-img');
      var pctEl = boot.querySelector('.boot-loading__pct');
      var fillEl = boot.querySelector('.boot-loading__fill');
      var barEl = boot.querySelector('.boot-loading__bar');
      var subEl = boot.querySelector('.boot-loading__sub');
      var timer = null;
      var progress = 0;

      function syncImageState() {
        if (!img) return;
        if (img.complete && img.naturalWidth > 0) {
          boot.classList.add('is-image-ready');
        } else {
          boot.classList.remove('is-image-ready');
        }
      }

      function render() {
        var shown = Math.max(0, Math.min(100, Math.floor(progress)));
        if (pctEl) pctEl.textContent = shown + '%';
        if (fillEl) fillEl.style.width = shown + '%';
        if (barEl) barEl.setAttribute('aria-valuenow', String(shown));
      }

      function stop() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function tick() {
        if (!overlay.isConnected || overlay.style.display === 'none') {
          stop();
          return;
        }
        if (progress >= 92) return;
        var step = progress < 35 ? (4 + Math.random() * 5) :
          progress < 70 ? (2 + Math.random() * 3.5) :
          (0.8 + Math.random() * 1.8);
        progress = Math.min(92, progress + step);
        render();
      }

      function start() {
        if (timer) return;
        tick();
        timer = setInterval(tick, 180);
      }

      if (img) {
        img.addEventListener('load', syncImageState);
        img.addEventListener('error', syncImageState);
        syncImageState();
      }

      if (subEl) {
        // ─── Tier 1：即刻顯示瀏覽器 connection 估算（< 1ms）───
        // 僅顯示 type + Mbps（不標 4G/5G、避免誤判）
        // navigator.connection 在 iOS Safari / Firefox 不支援 → 退到「偵測中」、後續 Tier 2 補上
        var networkLabel = '偵測中';
        var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (navigator.onLine === false) {
          networkLabel = '離線';
          subEl.textContent = '網路環境（離線）等待重連..';
        } else {
          if (conn) {
            var t = conn.type;
            var dl = conn.downlink; // Mbps（瀏覽器估算）
            if (t === 'wifi') networkLabel = 'Wi-Fi';
            else if (t === 'cellular') networkLabel = '行動';
            else if (t === 'ethernet') networkLabel = '有線';
            else if (conn.effectiveType) networkLabel = String(conn.effectiveType).toUpperCase();
            if (dl && isFinite(dl) && dl > 0) {
              networkLabel += ' · ' + (dl >= 10 ? Math.round(dl) : (Math.round(dl * 10) / 10)) + 'Mbps';
            }
          }
          subEl.textContent = '網路環境（' + networkLabel + '）載入資料中..';

          // ─── Tier 2：實測 RTT（並行 fetch favicon、~50-500ms 回應後更新）───
          // ?probe=<random> + cache:'no-store' 雙保險避開 SW / browser cache 命中
          var _probeStart = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
          try {
            fetch('/assets/icons/icon-192x192.png?probe=' + Date.now(), { cache: 'no-store' })
              .then(function () {
                var _now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                var rtt = Math.round(_now - _probeStart);
                var speed;
                if (rtt < 100) speed = '極快';
                else if (rtt < 300) speed = '快速';
                else if (rtt < 800) speed = '一般';
                else if (rtt < 2000) speed = '慢';
                else speed = '極慢';
                // Race condition guard：boot 結束後 subEl 可能仍在 DOM 但 overlay 已隱藏
                var ov = document.getElementById('loading-overlay');
                if (subEl.parentElement && ov && ov.style.display !== 'none') {
                  subEl.textContent = '網路（' + networkLabel + ' · ' + speed + ' ' + rtt + 'ms）載入中..';
                }
              })
              .catch(function () { /* 失敗保留 Tier 1 顯示 */ });
          } catch (_) { /* 不支援 fetch 或同步錯誤、無視 */ }
        }
      }

      render();
      window._bootLoadingAnim = { start: start, stop: stop };
    })();
  </script>

/* 管理工具：掃描並修復 activityRecords 狀態不一致 */
window._scanAR = async function(fix) {
  try {
    alert('scanning...');
    var arSnap = await db.collectionGroup('activityRecords').where('status', '==', 'registered').get();
    var arDocs = arSnap.docs.filter(function(d) { return d.ref.parent.parent !== null; });
    alert('found ' + arDocs.length + ' registered records, checking...');
    var regSnap = await db.collectionGroup('registrations').where('status', '==', 'cancelled').get();
    var cancelledMap = {};
    regSnap.docs.filter(function(d) { return d.ref.parent.parent !== null; }).forEach(function(rd) {
      var r = rd.data();
      var key = (r.userId || '') + '|' + (r.eventId || '');
      cancelledMap[key] = true;
    });
    var issues = [];
    arDocs.forEach(function(doc) {
      var ar = doc.data();
      if (!ar.uid || !ar.eventId) return;
      var key = ar.uid + '|' + ar.eventId;
      if (cancelledMap[key]) {
        issues.push(doc.id + '|' + (ar.name || '') + '|' + ar.uid.substring(0, 8));
      }
    });
    var msg = 'registered AR: ' + arSnap.size + ', cancelled reg match: ' + issues.length;
    if (issues.length > 0) {
      msg += '\n' + issues.join('\n');
    }
    alert(msg);
    if (fix && issues.length > 0) {
      for (var i = 0; i < issues.length; i++) {
        var docId = issues[i].split('|')[0];
        var ar = arSnap.docs.find(function(d) { return d.id === docId; });
        var arEventId = ar ? ar.data().eventId : null;
        var eventDocId = arEventId ? await FirebaseService._getEventDocIdAsync(arEventId) : null;
        if (!eventDocId) throw new Error('無法取得活動文件 ID: ' + arEventId);
        await db.collection('events').doc(eventDocId).collection('activityRecords').doc(docId).update({ status: 'cancelled' });
      }
      alert('fixed ' + issues.length);
    }
  } catch (e) {
    alert('error: ' + e.message);
  }
};

function _createSportHubTimeoutError(code, message) {
  const err = new Error(message || code || 'TIMEOUT');
  err.code = code || 'timeout';
  return err;
}

function _withSportHubTimeout(promise, ms, code, message) {
  const timeoutMs = Number(ms || 0);
  if (!Number.isFinite(timeoutMs) || timeoutMs <= 0) {
    return Promise.resolve(promise);
  }
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      reject(_createSportHubTimeoutError(code, message));
    }, timeoutMs);

    Promise.resolve(promise).then(
      value => {
        clearTimeout(timer);
        resolve(value);
      },
      err => {
        clearTimeout(timer);
        reject(err);
      }
    );
  });
}

/**
 * 判斷是否有 pending deep link（reload 後 URL 帶 ?event= / ?team= 等，
 * 已被 DOMContentLoaded 階段寫入 sessionStorage）。
 * 2026-04-25：用於 reload 時延後隱藏 boot overlay，避免「閃首頁→跳回原頁」瑕疵。
 */
function _hasPendingDeepLink() {
  try {
    return !!(
      sessionStorage.getItem('_pendingDeepEvent') ||
      sessionStorage.getItem('_pendingDeepTeam') ||
      sessionStorage.getItem('_pendingDeepTournament') ||
      sessionStorage.getItem('_pendingDeepProfile')
    );
  } catch (_) {
    return false;
  }
}

/**
 * 2026-04-27：偵測「URL 帶 hash 進來、navigation 尚未完成」
 * 用戶帶 #page-xxx 進來時、boot 過程中應該蓋住首頁、避免「先閃首頁」。
 * navigation 完成時呼叫 _dismissBootOverlayAfterHashNav() 解除守衛。
 */
function _hasPendingHashNav() {
  try {
    if (window._bootHashNavCompleted) return false;
    const h = (location.hash || '').replace(/^#/, '');
    return !!(h && h !== 'page-home' && /^page-[\w-]+$/.test(h));
  } catch (_) {
    return false;
  }
}

function _hasPendingHistoryNav() {
  try {
    return !!(window._bootHistoryNavPending && !window._bootHistoryNavCompleted);
  } catch (_) {
    return false;
  }
}

/**
 * Deep link 跳轉完成（或 fallback / sessionStorage 清除）後呼叫，
 * 強制觸發 boot overlay 隱藏（解除 _hasPendingDeepLink 守衛）。
 */
function _dismissBootOverlayAfterDeepLink(reason) {
  if (window._bootOverlayDeferredTimeout) {
    clearTimeout(window._bootOverlayDeferredTimeout);
    window._bootOverlayDeferredTimeout = null;
  }
  window._bootOverlayForceDismiss = true;
  _dismissBootOverlay(reason || 'deep-link-done');
}

/**
 * 2026-04-27：hash navigation 完成後呼叫、強制觸發 boot overlay 隱藏。
 * 解除 _hasPendingHashNav 守衛。
 */
function _dismissBootOverlayAfterHashNav(reason) {
  window._bootHashNavCompleted = true;
  if (window._bootOverlayDeferredTimeout) {
    clearTimeout(window._bootOverlayDeferredTimeout);
    window._bootOverlayDeferredTimeout = null;
  }
  window._bootOverlayForceDismiss = true;
  _dismissBootOverlay(reason || 'hash-nav-done');
}

function _dismissBootOverlayAfterHistoryNav(reason) {
  window._bootHistoryNavCompleted = true;
  window._bootHistoryNavPending = false;
  if (window._bootOverlayDeferredTimeout) {
    clearTimeout(window._bootOverlayDeferredTimeout);
    window._bootOverlayDeferredTimeout = null;
  }
  window._bootOverlayForceDismiss = true;
  _dismissBootOverlay(reason || 'history-nav-done');
}

/** 隱藏啟動 loading overlay（進度條跳 100% → 150ms 後淡出） */
function _dismissBootOverlay(reason) {
  try {
    var _ov = document.getElementById('loading-overlay');
    if (!_ov || _ov.style.display === 'none') return;

    // 2026-04-25：最短顯示時間守衛（避免 cache 命中時進度條一閃即逝）
    // Phase 3 快取命中(~200ms)會立刻觸發 _dismissBootOverlay，進度條才跑到 ~10% 就被
    // 強制跳到 100%，總顯示 < 500ms。加 2500ms 守衛確保用戶看到完整動畫流程。
    // 與下方「pending deep link 守衛」串聯：先滿足 minVisible，再判斷 deep link。
    // 詳見 docs/tunables.md #boot-overlay-min-visible
    // 2026-04-28: fixed wait disabled; hash target shell now prevents the home flash.
    var MIN_VISIBLE_MS = 0;
    var shownAt = window._bootOverlayShownAt || 0;
    var elapsed = shownAt ? (Date.now() - shownAt) : MIN_VISIBLE_MS;
    if (elapsed < MIN_VISIBLE_MS) {
      if (window._bootOverlayMinVisibleTimer) return; // 已有 pending timer 不重設
      var wait = MIN_VISIBLE_MS - elapsed;
      console.log('[Boot] 等 ' + wait + 'ms 達到最短顯示時間 (reason: ' + (reason || '') + ')');
      window._bootOverlayMinVisibleTimer = setTimeout(function() {
        window._bootOverlayMinVisibleTimer = null;
        _dismissBootOverlay(reason);
      }, wait);
      return;
    }

    // 2026-04-25：reload 帶 ?event= 等 deep link 時延後隱藏，避免「閃首頁→跳回」
    // 2026-04-27：擴充涵蓋 hash navigation（用戶帶 #page-xxx 進來）、避免「先閃首頁→才跳目標頁」
    // 等 navigation 完成由 _dismissBootOverlayAfterDeepLink() / _dismissBootOverlayAfterHashNav() 強制觸發
    // 7 秒安全超時：即使 navigation 卡住也不會永遠遮罩（看門狗 8 秒兜底之前）
    // 2026-04-27 調整：5000 → 7000ms。用戶實測 mobile/慢網路下 page-activities 等
    // hash nav 經常需要 5+ 秒（cloud ready + ensureCollectionsForPage），5 秒不夠導致
    // overlay 提早隱藏 → 看到首頁閃過 → 1-2 秒後 nav 完成才跳目標頁。詳見 docs/tunables.md
    if ((_hasPendingDeepLink() || _hasPendingHashNav() || _hasPendingHistoryNav()) && !window._bootOverlayForceDismiss) {
      if (!window._bootOverlayDeferredHide) {
        window._bootOverlayDeferredHide = true;
        const _navType = _hasPendingDeepLink() ? 'deep link' : (_hasPendingHashNav() ? 'hash navigation' : 'history navigation');
        console.log('[Boot] pending ' + _navType + ' 偵測到，延後隱藏 boot overlay (' + (reason || '') + ')');
        window._bootOverlayDeferredTimeout = setTimeout(function() {
          console.warn('[Boot] ' + _navType + ' 7 秒未完成，強制隱藏 boot overlay');
          window._bootOverlayForceDismiss = true;
          _dismissBootOverlay('nav-timeout');
        }, 7000);
      }
      return;
    }

    if (window._bootLoadingAnim) window._bootLoadingAnim.stop();
    var _pct = _ov.querySelector('.boot-loading__pct');
    var _fill = _ov.querySelector('.boot-loading__fill');
    var _bar = _ov.querySelector('.boot-loading__bar');
    if (_pct) _pct.textContent = '100%';
    if (_fill) _fill.style.width = '100%';
    if (_bar) _bar.setAttribute('aria-valuenow', '100');
    setTimeout(function() {
      _ov.style.display = 'none';
      console.log('[Boot] 載入畫面已隱藏（' + (reason || '') + '）');
      _startContentStallCheck();
      // Phase 6 D11:overlay 真正隱藏後立即嘗試安裝 sentinel(只 LIFF / PWA standalone 才裝)
      if (window.App && typeof window.App._maybePushBootSentinel === 'function') {
        try { window.App._maybePushBootSentinel(); } catch (_) {}
      }
    }, 150);
    if (window._loadingSafety) { clearTimeout(window._loadingSafety); window._loadingSafety = null; }
  } catch (_) {}
}

/**
 * 白屏卡住偵測：boot-loading 消失後 6 秒，
 * 若頁面內容仍未渲染（_contentReady === false）則顯示重整提示。
 * 僅觸發一次，不自動重整，由用戶決定。
 */
function _startContentStallCheck() {
  if (window._contentStallTimer) return;
  // SWR 模式下延長至 15 秒（骨架顯示中不急著報警）
  var stallMs = (typeof App !== 'undefined' && App._cloudReady) ? 6000 : 15000;
  window._contentStallTimer = setTimeout(function() {
    window._contentStallTimer = null;

  /**

   * @param {string} contentId  內容容器 ID
   * @param {string} tabsId     頁籤容器 ID
   * @param {Function} onSwitch 切換回呼，傳入新 tab 的 key
   * @param {Function} getKey   從 tab button 取 key 的函式
   */
  _bindSwipeTabs(contentId, tabsId, onSwitch, getKey) {
    var content = document.getElementById(contentId);
    if (!content || content.dataset.swipeBound) return;
    content.dataset.swipeBound = '1';

    var startX = 0, startY = 0, startTime = 0;
    var swiping = false, locked = false, animating = false;
    var contentW = 0;

      content.style.transition = '';
      content.style.transform = '';
      content.style.opacity = '';

      startY = e.touches[0].clientY;

      swiping = false;
      locked = false;
      contentW = content.offsetWidth;
      content.style.transition = 'none';
      content.style.willChange = 'transform, opacity';
    }, { passive: true });

      if (locked || animating) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;

      if (!swiping) {
        if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) { locked = true; return; }
        if (Math.abs(dx) > 10) { swiping = true; } else { return; }
      }

      if (e.cancelable) e.preventDefault();

      var tabs = document.getElementById(tabsId);
      if (!tabs) return;
      var buttons = Array.from(tabs.querySelectorAll('button'));
      var activeIdx = buttons.findIndex(function (b) { return b.classList.contains('active'); });

      var ratio = dx / (contentW || 1);

      // 邊界阻尼：第一頁往右拖 或 最後一頁往左拖
      if ((activeIdx <= 0 && dx > 0) || (activeIdx >= buttons.length - 1 && dx < 0)) {
        ratio *= 0.3;
      }

      content.style.transform = 'translateX(' + (ratio * 100) + '%)';
      content.style.opacity = String(Math.max(1 - Math.abs(ratio) * 0.4, 0.5));
    }, { passive: false });

    content.addEventListener('touchend', function (e) {
      content.style.willChange = '';

        content.style.transition = '';
        content.style.transform = '';

      var dx = e.changedTouches[0].clientX - startX;
      var elapsed = Date.now() - startTime;
      var velocity = Math.abs(dx) / (elapsed || 1);

      var tabs = document.getElementById(tabsId);
      if (!tabs) { _reset(); return; }
      var buttons = Array.from(tabs.querySelectorAll('button'));
      if (buttons.length < 2) { _reset(); return; }

      var activeIdx = buttons.findIndex(function (b) { return b.classList.contains('active'); });
      if (activeIdx < 0) { _reset(); return; }

      // 閾值：40px 距離 或 速度 > 0.3 px/ms 且至少 20px
      var shouldSwitch = Math.abs(dx) >= 40 || (Math.abs(dx) >= 20 && velocity > 0.3);
      var nextIdx = dx < 0
        ? Math.min(activeIdx + 1, buttons.length - 1)
        : Math.max(activeIdx - 1, 0);

      if (!shouldSwitch || nextIdx === activeIdx) {
        // 彈回原位
        content.style.transition = 'transform .25s cubic-bezier(.2,.9,.3,1), opacity .25s ease';
        content.style.transform = 'translateX(0)';
        content.style.opacity = '1';
        _onTransitionEnd(function () { _reset(); });
        return;
      }

      // 滑出動畫
      animating = true;
      var exitDir = dx < 0 ? '-100%' : '100%';
      var enterFrom = dx < 0 ? '40%' : '-40%';

      content.style.transition = 'transform .2s cubic-bezier(.4,0,1,1), opacity .18s ease';
      content.style.transform = 'translateX(' + exitDir + ')';
      content.style.opacity = '0';

      _onTransitionEnd(function () {
        // 切換頁籤（觸發重新渲染）
        var key = getKey(buttons[nextIdx]);
        if (key != null) {
          content.style.transition = 'none';
          content.style.transform = 'translateX(' + enterFrom + ')';
          content.style.opacity = '0';

          onSwitch.call(App, key);

          // 強制 reflow 後啟動滑入動畫
          void content.offsetWidth;

          content.style.transition = 'transform .25s cubic-bezier(.0,0,.2,1), opacity .2s ease';
          content.style.transform = 'translateX(0)';
          content.style.opacity = '1';

          _onTransitionEnd(function () {
            _reset();
            animating = false;
          });

          buttons[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
          _reset();
          animating = false;
        }
      });
    }, { passive: true });
  },

  /**
   * 2026-04-20：容器高度鎖（fire-and-forget 模式）。防止 innerHTML 替換期間
   * 頁面總高度瞬間縮短，導致瀏覽器自動 clamp scrollTop 造成「跳回頂部」。
   *
   * 用法：在要做 innerHTML 替換的函式入口呼叫：
   *   App._lockContainerHeight(container);  // 自動鎖 1 frame 後解鎖
   *
   * 三端相容（Chrome / Safari / LINE WebView）：
   *   - getBoundingClientRect / style.minHeight / requestAnimationFrame 皆成熟 API
   *   - setTimeout(300) 兜底防 rAF 被背景分頁凍結
   *   - 返回 release 函式供呼叫者手動提前解鎖（可選）
   *
   * @param {Element} container 要鎖高度的容器
   * @returns {Function} release 函式（可選呼叫提前解鎖；通常自動解鎖就夠）
   */
  _lockContainerHeight(container) {
    var noop = function () {};
    if (!container || typeof container.getBoundingClientRect !== 'function') return noop;
    var rect = container.getBoundingClientRect();
    if (!rect || rect.height <= 0) return noop;
    container.style.minHeight = Math.ceil(rect.height) + 'px';
    var released = false;
    var release = function () {
      if (released) return;
      released = true;
      container.style.minHeight = '';
    };
    requestAnimationFrame(release);
    // 兜底：rAF 若被背景分頁凍結，300ms 後強制解鎖
    setTimeout(release, 300);
    return release;
  },

  _getTrackableUserPromptInfo(message, options = {}) {
    const text = String(message || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    if (!text) return null;

    const forcedKey = String(options.promptKey || options.reason || '').trim();
    const surface = String(options.surface || options.source || '').trim();
    if (options.force || forcedKey || surface === 'relogin_modal') {
      return {
        key: forcedKey || 'manual_prompt',
        category: 'auth_session',
        surface: surface || 'manual',
      };
    }

    const requiresReauth = /重新登入|重新整理|重整頁面|清除瀏覽器緩存|關閉所有分頁/.test(text);
    const authStatePrompt = /session\s*已過期|登入狀態.*(異常|不同步|過期|失效)|登入已過期|LINE 登入已過期|Firebase 登入失敗|Firebase auth uid mismatch|身分不一致|uid mismatch/i.test(text);
    if (authStatePrompt || (requiresReauth && /登入|LINE|Firebase|auth|uid|權限不足/i.test(text))) {
      return {
        key: authStatePrompt ? 'auth_session_prompt' : 'reauth_required_prompt',
        category: text.includes('權限不足') ? 'permission_reauth' : 'auth_session',
        surface: surface || 'toast',
      };
    }

    return null;
  },

  logUserPrompt(message, options = {}) {
    try {
      const text = String(message || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      const info = this._getTrackableUserPromptInfo(text, options);
      if (!info || !text || typeof ApiService === 'undefined' || typeof ApiService._writeErrorLog !== 'function') return false;

      const curUser = ApiService.getCurrentUser?.() || this.currentUser || {};
      const uid = curUser.uid || curUser.lineUserId || curUser.userId || '';
      const page = this.currentPage || this._currentPage || document.querySelector('.page.active')?.id || 'unknown';
      const now = Date.now();
      if (!this._userPromptLogDedup) this._userPromptLogDedup = new Map();
      const dedupKey = [uid, page, info.category, info.surface, info.key, text].join('|');
      const lastMs = this._userPromptLogDedup.get(dedupKey) || 0;
      if (now - lastMs < 2 * 60 * 1000) return false;
      this._userPromptLogDedup.set(dedupKey, now);
      if (this._userPromptLogDedup.size > 80) {
        const cutoff = now - 10 * 60 * 1000;
        this._userPromptLogDedup.forEach((value, key) => {
          if (value < cutoff) this._userPromptLogDedup.delete(key);
        });
      }

      const err = new Error(text);
      err.name = 'UserPromptShown';
      err.code = 'user-prompt';
      err.stack = '';
      ApiService._writeErrorLog({
        fn: options.fn || 'showToast',
        logType: 'user_prompt',
        action: 'shown',
        category: info.category,
        promptKey: info.key,
        surface: info.surface,
        promptMessage: text,
        dedupBucket: Math.floor(now / (2 * 60 * 1000)),
        page,
        route: typeof location !== 'undefined' ? (location.hash || '') : '',
        reason: options.reason || '',
      }, err);
      return true;
    } catch (_) {
      return false;
    }
  },

  showToast(msg, duration) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(this._toastTimer);
    const textLen = msg ? Array.from(String(msg).replace(/\s/g, '')).length : 0;
    const ms = duration || (msg && msg.includes('\n') ? 4000 : (textLen > 24 ? 3500 : 2500));
    this._toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
    this.logUserPrompt?.(msg, { source: 'toast' });
  },

  _isSafeToAutoReload() {
    const root = typeof window !== 'undefined' ? window : globalThis;
    const doc = typeof document !== 'undefined' ? document : null;
    const blocked = (reason, canPrompt = true) => ({ safe: false, reason, canPrompt });
    const ok = () => ({ safe: true, reason: 'safe', canPrompt: false });
    const hasEntries = (value) => {
      if (!value) return false;
      if (typeof value.size === 'number') return value.size > 0;
      if (Array.isArray(value)) return value.length > 0;
      if (typeof value === 'object') return Object.keys(value).length > 0;
      return Boolean(value);
    };

    if (root._swReloading) return blocked('already-reloading', false);
    if (root._swJustCleared) return blocked('just-cleared', false);
    if (root._appInitializing) return blocked('initializing', false);
    if (root._contentReady === false) return blocked('boot-pending', false);
    if (this._cloudReadyPromise && !this._cloudReady && !this._cloudReadyError) return blocked('boot-pending', false);
    if (this._pendingProtectedBootRoutePromise || this._pendingDeepLinkOpenPromise || root._bootHistoryNavPending) {
      return blocked('route-pending');
    }
    if (this._routeTransitionPending) return blocked('route-pending');

    const pageLoader = root.PageLoader || (typeof PageLoader !== 'undefined' ? PageLoader : null);
    if (pageLoader && hasEntries(pageLoader._loading)) return blocked('page-loader-pending');

    if (doc) {
      if (doc.body?.classList?.contains('image-cropper-open')) return blocked('image-cropper-open');
      const modalSelector = [
        '.modal.open',
        '#modal-overlay.open',
        '#app-confirm-modal.open',
        '#uid-qr-modal.open',
        '#scan-result-modal.open',
        '#scan-family-modal.open',
        '#mobile-line-login-hint-modal.open',
        '#pwa-android-modal.open',
        '#pwa-ios-modal.open',
        '.pwa-modal-overlay.open',
        '.pwa-modal-overlay.show',
        '.edu-session-form-overlay',
        '.edu-cp-form-v2',
      ].join(',');
      if (doc.querySelector(modalSelector)) return blocked('modal-open');
    }

    const lineAuth = root.LineAuth || (typeof LineAuth !== 'undefined' ? LineAuth : null);
    const lineAuthPending = lineAuth
      && (
        (typeof lineAuth.isPendingLogin === 'function' && lineAuth.isPendingLogin())
        || (typeof lineAuth.hasLiffSession === 'function' && lineAuth.hasLiffSession() && !lineAuth._ready)
      );
    if (this._pendingAuthAction || this._pendingAuthActionPromise || this._pendingLineLoginAfterHint || lineAuthPending) {
      return blocked('auth-pending');
    }

    if (this._attendanceEditingEventId || this._unregEditingEventId || this._waitlistEditingEventId) {
      return blocked('roster-editing');
    }
    if (this._attendanceSubmittingEventId || this._unregSubmittingEventId) return blocked('write-pending');
    if (hasEntries(this._waitlistActionPending) || hasEntries(this._tsTeamSplitPendingOps) || hasEntries(this._tsTeamSplitPendingTokens)) {
      return blocked('write-pending');
    }
    if (this._scannerInstance) return blocked('scanner-active');

    const safePages = new Set(['page-home', 'page-activities', 'page-teams', 'page-profile']);
    if (!safePages.has(this.currentPage || '')) return blocked('unsafe-page');
    return ok();
  },

  _showSwReloadPrompt(decision = {}) {
    const root = typeof window !== 'undefined' ? window : globalThis;
    const doc = typeof document !== 'undefined' ? document : null;
    if (!doc || !doc.body || root._swReloadPromptShown) return;
    root._swReloadPromptShown = true;

    const prompt = doc.createElement('div');
    prompt.id = 'sw-reload-deferred-prompt';
    prompt.setAttribute('role', 'status');
    prompt.setAttribute('aria-live', 'polite');
    prompt.style.cssText = [
      'position:fixed',
      'left:50%',
      'bottom:calc(72px + env(safe-area-inset-bottom, 0px))',
      'transform:translateX(-50%)',
      'z-index:100000',
      'width:min(420px, calc(100vw - 32px))',
      'background:#111827',
      'color:#fff',
      'border:1px solid rgba(255,255,255,.16)',
      'border-radius:12px',
      'box-shadow:0 16px 40px rgba(0,0,0,.28)',
      'padding:12px',
      'display:flex',
      'align-items:center',
      'gap:10px',
      'font-size:14px',
      'line-height:1.35',
    ].join(';');
    prompt.innerHTML =
      '<div style="flex:1;min-width:0">' +
        '<div style="font-weight:700;margin-bottom:2px">有新版本可用</div>' +
        '<div style="opacity:.84">完成目前操作後會自動更新。</div>' +
      '</div>' +
      '<button type="button" data-sw-reload-now style="' +
        'border:0;border-radius:8px;background:#0d9488;color:#fff;' +
        'font-weight:700;padding:8px 10px;cursor:pointer;white-space:nowrap' +
      '">現在更新</button>' +
      '<button type="button" data-sw-reload-later aria-label="稍後" style="' +
        'border:0;border-radius:8px;background:rgba(255,255,255,.12);color:#fff;' +
        'font-weight:700;padding:8px 9px;cursor:pointer' +
      '">稍後</button>';

    prompt.querySelector('[data-sw-reload-now]')?.addEventListener('click', () => {
      const result = this._maybeRunDeferredSwReload('user-click', { force: true });
      if (!result?.reloaded) this.showToast?.('目前操作尚未完成，稍後再更新', 3000);
    });
    prompt.querySelector('[data-sw-reload-later]')?.addEventListener('click', () => {
      prompt.remove();
      root._swReloadPromptShown = false;
    });

    doc.body.appendChild(prompt);
    if (decision.reason) root._swReloadDeferredReason = decision.reason;
  },

  _deferSwReload(reason = 'unsafe-page', decision = null) {
    const root = typeof window !== 'undefined' ? window : globalThis;
    root._swReloadDeferred = true;
    root._swReloadDeferredReason = reason;
    if (!decision || decision.canPrompt !== false) this._showSwReloadPrompt(decision || { reason, canPrompt: true });
    return { reloaded: false, deferred: true, reason };
  },

  _reloadForServiceWorkerUpdate() {
    const root = typeof window !== 'undefined' ? window : globalThis;
    root._swReloading = true;
    root._swReloadDeferred = false;
    root._swReloadDeferredReason = '';
    root._swReloadPromptShown = false;
    if (root.location && typeof root.location.reload === 'function') root.location.reload();
    return { reloaded: true, reason: 'safe' };
  },

  _isHardSwReloadBlock(reason) {
    return [
      'already-reloading',
      'just-cleared',
      'initializing',
      'boot-pending',
      'auth-pending',
      'roster-editing',
      'write-pending',
      'scanner-active',
      'image-cropper-open',
    ].includes(reason);
  },

  _maybeRunDeferredSwReload(trigger = '', options = {}) {
    const root = typeof window !== 'undefined' ? window : globalThis;
    if (!root._swReloadDeferred || root._swReloading) return { reloaded: false, deferred: false, reason: 'none' };
    const decision = this._isSafeToAutoReload();
    if (decision.safe) return this._reloadForServiceWorkerUpdate();
    if (options?.force && !this._isHardSwReloadBlock(decision.reason)) {
      return this._reloadForServiceWorkerUpdate();
    }
    root._swReloadDeferredReason = decision.reason || trigger || 'unsafe-page';
    if (decision.canPrompt !== false) this._showSwReloadPrompt(decision);
    return { reloaded: false, deferred: true, reason: root._swReloadDeferredReason };
  },

  _handleSwControllerChange() {
    const decision = this._isSafeToAutoReload();
    if (decision.safe) return this._reloadForServiceWorkerUpdate();
    return this._deferSwReload(decision.reason, decision);
  },

  _getRouteLoadingCopy(pageId, phase = 'page') {
    if (phase === 'auth') return '正在同步 LINE 登入與資料...';
    if (phase === 'cloud') return '正在同步資料，請稍候...';
    const pageLabels = {
      'page-activities': '活動',
      'page-activity-detail': '活動詳情',
      'page-teams': '俱樂部',
      'page-team-detail': '俱樂部詳情',
      'page-profile': '個人資料',
      'page-messages': '訊息',
      'page-game': '小遊戲',
      'page-scan': '掃碼頁面',
      'page-shop': '商城',
      'page-achievements': '成就頁面',
      'page-personal-dashboard': '個人儀表板',
      'page-temp-participant-report': '臨時查詢報表',
      'page-qrcode': 'QR Code',
    };
    const label = pageLabels[pageId];
    if (!label) return '資料載入中...';
    return `正在載入${label}...`;
  },

  _beginRouteLoading(options = {}) {
    const {
      pageId = '',
      phase = 'page',
      immediate = false,
      delayMs = 220,
      minVisibleMs = 280,
      slowMs = 3200,
    } = options;
    const overlay = document.getElementById('status-hint');
    const deepLinkOverlay = document.getElementById('deep-link-overlay');
    const bootOverlay = document.getElementById('loading-overlay');
    if (!overlay) return 0;
    if (deepLinkOverlay && deepLinkOverlay.style.display !== 'none') return 0;
    if (bootOverlay && bootOverlay.style.display !== 'none') return 0;

    const seq = ++this._routeLoadingSeq;
    clearTimeout(this._routeLoadingShowTimer);
    clearTimeout(this._routeLoadingSlowTimer);
    clearTimeout(this._routeLoadingHideTimer);
    this._routeLoadingShowTimer = null;
    this._routeLoadingSlowTimer = null;
    this._routeLoadingHideTimer = null;

    const textEl = overlay.querySelector('[data-status-hint-text]');
    const copy = this._getRouteLoadingCopy(pageId, phase);

    const show = () => {
      if (seq !== this._routeLoadingSeq) return;
      if (textEl) textEl.textContent = copy;
      overlay.style.display = 'inline-flex';
      overlay.classList.add('show');
      this._routeLoadingShownAt = Date.now();
      this._routeLoadingSlowTimer = setTimeout(() => {
        if (seq !== this._routeLoadingSeq) return;
        if (textEl) textEl.textContent = '網路較慢，資料仍在載入中...';
      }, slowMs);
    };

    const shouldShowImmediately = immediate || overlay.style.display !== 'none';
    if (shouldShowImmediately) {
      show();
    } else {
      this._routeLoadingShowTimer = setTimeout(show, delayMs);
    }

    overlay.dataset.minVisibleMs = String(minVisibleMs);
    return seq;
  },

  _endRouteLoading(seq) {
    if (!seq || seq !== this._routeLoadingSeq) return;
    const overlay = document.getElementById('status-hint');
    clearTimeout(this._routeLoadingShowTimer);
    clearTimeout(this._routeLoadingSlowTimer);
    clearTimeout(this._routeLoadingHideTimer);
    this._routeLoadingShowTimer = null;
    this._routeLoadingSlowTimer = null;
    this._routeLoadingHideTimer = null;

    if (!overlay || overlay.style.display === 'none') return;

    const minVisibleMs = Number(overlay.dataset.minVisibleMs || 280);
    const elapsed = Date.now() - (this._routeLoadingShownAt || 0);
    const waitMs = Math.max(0, minVisibleMs - elapsed);
    const hide = () => {
      if (seq !== this._routeLoadingSeq) return;
      overlay.classList.remove('show');
      this._routeLoadingHideTimer = setTimeout(() => {
        if (seq !== this._routeLoadingSeq) return;
        overlay.style.display = 'none';
      }, 180);
    };

    if (waitMs > 0) {
      this._routeLoadingHideTimer = setTimeout(hide, waitMs);
      return;
    }
    hide();
  },

  /** 自訂確認 Modal（取代原生 confirm，不會被瀏覽器封鎖） */
  appConfirm(msg) {
    return new Promise(resolve => {
      const modal = document.getElementById('app-confirm-modal');
      document.getElementById('app-confirm-msg').textContent = msg;
      modal.classList.add('open');
      document.body.classList.add('modal-open');
      const ok = document.getElementById('app-confirm-ok');
      const cancel = document.getElementById('app-confirm-cancel');
      cancel.style.display = '';
      ok.textContent = '確定';
      const cleanup = (result) => {
        modal.classList.remove('open');
        document.body.classList.remove('modal-open');
        ok.replaceWith(ok.cloneNode(true));
        cancel.replaceWith(cancel.cloneNode(true));
        resolve(result);
      };
      ok.addEventListener('click', () => cleanup(true), { once: true });
      cancel.addEventListener('click', () => cleanup(false), { once: true });
    });
  },

  /** 自訂提示 Modal（單按鈕，僅顯示訊息，支援 HTML 內容） */
  appAlert(msg, options = {}) {
    return new Promise(resolve => {
      const modal = document.getElementById('app-confirm-modal');
      const msgEl = document.getElementById('app-confirm-msg');
      if (options.html) msgEl.innerHTML = msg;
      else msgEl.textContent = msg;
      modal.classList.add('open');
      document.body.classList.add('modal-open');
      const ok = document.getElementById('app-confirm-ok');
      const cancel = document.getElementById('app-confirm-cancel');
      cancel.style.display = 'none';
      ok.textContent = options.okText || '確定';
      const cleanup = () => {
        modal.classList.remove('open');
        document.body.classList.remove('modal-open');
        msgEl.innerHTML = '';
        ok.replaceWith(ok.cloneNode(true));
        cancel.style.display = '';
        ok.textContent = '確定';
        resolve(true);
      };
      ok.addEventListener('click', cleanup, { once: true });
    });
  },

  async confirmClearCache() {
    // 清除快取用特殊 HTML 彈窗（含 Warning 紅字）
    const msgEl = document.getElementById('app-confirm-msg');
    msgEl.innerHTML = '<div class="app-confirm-warning">⚠ Warning</div>'
      + '確定要清除所有快取並重新登入嗎？<br>'
      + '這會回到最乾淨的狀態，或許可解決白屏或異常問題，'
      + '但若您的網路狀態與手機性能不佳時可能會讓問題更嚴重。<br>'
      + '建議您先使用關閉分頁並重新登入的方式試試看。';
    const modal = document.getElementById('app-confirm-modal');
    modal.classList.add('open');
    document.body.classList.add('modal-open');
    const ok = document.getElementById('app-confirm-ok');
    const cancel = document.getElementById('app-confirm-cancel');
    const yes = await new Promise(resolve => {
      const cleanup = (result) => {
        modal.classList.remove('open');
        document.body.classList.remove('modal-open');
        msgEl.innerHTML = '';
        ok.replaceWith(ok.cloneNode(true));
        cancel.replaceWith(cancel.cloneNode(true));
        resolve(result);
      };
      ok.addEventListener('click', () => cleanup(true), { once: true });
      cancel.addEventListener('click', () => cleanup(false), { once: true });
    });
    if (!yes) return;
    try {
      // 先正式登出 Firebase Auth + LIFF，避免清除儲存後產生半死半活狀態
      // （LIFF WebView session 存活但 access token 已清 → _ensureAuth 永遠失敗）
      try { if (typeof auth !== 'undefined' && auth && auth.currentUser) await auth.signOut(); } catch(_){}
      try { if (typeof liff !== 'undefined' && liff.isLoggedIn && liff.isLoggedIn()) liff.logout(); } catch(_){}
      if (typeof LineAuth !== 'undefined') {
        LineAuth._profile = null;
        LineAuth._profileError = null;
        LineAuth._profileLoading = false;
        LineAuth._profilePromise = null;
        try { LineAuth._clearProfileCache(); } catch(_){}
      }
      if ('caches' in window) { var ks = await caches.keys(); await Promise.all(ks.map(function(n){ return caches.delete(n); })); }
      if ('serviceWorker' in navigator) { var regs = await navigator.serviceWorker.getRegistrations(); regs.forEach(function(r){ r.unregister(); }); }
      var lsKeys = Object.keys(localStorage);
      for (var i = 0; i < lsKeys.length; i++) {
        var k = lsKeys[i];
        if (k.indexOf('shub_c_') === 0 || k.indexOf('shub_ts_') === 0 || k.indexOf('shub_cache_') === 0 || k.indexOf('LIFF') === 0) {
          localStorage.removeItem(k);
        }
      }
      localStorage.removeItem('sporthub_auto_exp_rules');
      localStorage.removeItem('sporthub_auto_exp_logs');
      try { var dbs = await indexedDB.databases(); dbs.forEach(function(db){ indexedDB.deleteDatabase(db.name); }); } catch(_){}
      // 清除登入重試計數，讓重載後能正常觸發自動登入
      try { sessionStorage.removeItem('_lineLoginRetryCount'); } catch(_){}
    } catch(_){}
    location.href = location.pathname + '?clear=1';
  },

  /** 跨瀏覽器剪貼簿複製（clipboard API → execCommand fallback） */
  async _copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try { await navigator.clipboard.writeText(text); return true; } catch (_) { /* fall through */ }
    }
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (_) { return false; }
  },

  _getPendingDeepLink() {
    try {
      const pendingEvent = String(sessionStorage.getItem('_pendingDeepEvent') || '').trim();
      if (pendingEvent) return { type: 'event', id: pendingEvent };
      const pendingTeam = String(sessionStorage.getItem('_pendingDeepTeam') || '').trim();
      if (pendingTeam) return { type: 'team', id: pendingTeam };
      const pendingTournament = String(sessionStorage.getItem('_pendingDeepTournament') || '').trim();
      if (pendingTournament) return { type: 'tournament', id: pendingTournament };
      const pendingProfile = String(sessionStorage.getItem('_pendingDeepProfile') || '').trim();
      if (pendingProfile) return { type: 'profile', id: pendingProfile };
    } catch (_) {}
    return null;
  },

  _clearPendingDeepLink() {
    try {
      sessionStorage.removeItem('_pendingDeepEvent');
      sessionStorage.removeItem('_pendingDeepTeam');
      sessionStorage.removeItem('_pendingDeepTournament');
      sessionStorage.removeItem('_pendingDeepProfile');
    } catch (_) {}
    // 2026-04-25：若 boot overlay 因 pending deep link 延後隱藏，強制觸發隱藏
    // 涵蓋所有路徑：成功跳轉完成、fallback、主動清除
    if (typeof _dismissBootOverlayAfterDeepLink === 'function' && window._bootOverlayDeferredHide) {
      _dismissBootOverlayAfterDeepLink('pending-cleared');
    }
  },

  _getTournamentRouteParam() {
    try {
      return String(new URL(window.location.href).searchParams.get('tournament') || '').trim();
    } catch (_) {
      return '';
    }
  },

  _syncTournamentDetailRoute(tournamentId) {
    const id = String(tournamentId || '').trim();
    if (!id) return;
    try {
      const flags = this._getHistoryRouteFlags?.() || {};
      if (flags.writeDetailPaths && !this._shouldDisableHistoryPathWrite?.(flags)) {
        this._setRouteUrl?.({ pageId: 'page-tournament-detail', id }, { mode: 'replace' });
        return;
      }
    } catch (_) {}
    if (this._isCurrentHistoryDetailRoute?.('page-tournament-detail', id)) return;
    try {
      const url = new URL(window.location.href);
      url.searchParams.set('tournament', id);
      url.hash = 'page-tournament-detail';
      // Phase 6 Commit A:fallback path 也帶完整 state(原本是 null,LIFF 內 popstate 拿不到 id)
      const state = { source: 'sportshub', pageId: 'page-tournament-detail', id };
      history.replaceState(state, '', url.pathname + (url.search || '') + (url.hash || ''));
    } catch (_) {}
  },

  _clearTournamentDetailRouteParam() {
    try {
      const url = new URL(window.location.href);
      const flags = this._getHistoryRouteFlags?.() || {};
      if (flags.writeDetailPaths
        && !this._shouldDisableHistoryPathWrite?.(flags)
        && /^\/tournaments\/[A-Za-z0-9_-]{3,80}\/?$/.test(url.pathname || '')) {
        history.replaceState(this._buildRouteStateForCurrentPage?.('page-home') || { source: 'sportshub', pageId: 'page-home' }, '', '/');
        return;
      }
      if (!url.searchParams.has('tournament')) return;
      url.searchParams.delete('tournament');
      history.replaceState(this._buildRouteStateForCurrentPage?.() || { source: 'sportshub', pageId: this.currentPage || 'page-home' }, '', url.pathname + (url.search || '') + (url.hash || ''));
    } catch (_) {}
  },

  _shouldPreserveDeepLinkQueryParam(key) {
    if (key !== 'tournament') return false;
    const tournamentId = this._getTournamentRouteParam?.();
    return !!(tournamentId
      && this.currentPage === 'page-tournament-detail'
      && String(this.currentTournament || '').trim() === tournamentId);
  },

  _clearDeepLinkQueryParams() {
    try {
      const url = new URL(window.location.href);
      let changed = false;
      ['event', 'team', 'tournament', 'profile', 'rid'].forEach((key) => {
        if (!url.searchParams.has(key)) return;
        if (this._shouldPreserveDeepLinkQueryParam?.(key)) return;
        url.searchParams.delete(key);
        changed = true;
      });
      if (changed) {
        const state = this._buildRouteStateForCurrentPage?.() || this._buildCurrentRouteState?.() || { source: 'sportshub', pageId: this.currentPage || 'page-home' };
        history.replaceState(state, '', url.pathname + (url.search || '') + (url.hash || ''));
      }
    } catch (_) {}
  },

  _showDeepLinkOverlay(type) {
    const overlay = document.getElementById('deep-link-overlay');
    if (!overlay) return;
    const title = overlay.querySelector('[data-deep-link-title]');
    const sub = overlay.querySelector('[data-deep-link-sub]');
    const titleMap = { team: '正在前往俱樂部頁面', tournament: '正在前往賽事頁面', profile: '正在前往個人名片' };
    if (title) title.textContent = titleMap[type] || '正在前往活動頁面';
    if (sub) sub.textContent = '正在確認登入與資料，請稍候...';
    overlay.classList.remove('is-hiding');
    overlay.style.display = 'flex';
  },

  _hideDeepLinkOverlay() {
    const overlay = document.getElementById('deep-link-overlay');
    if (!overlay || overlay.style.display === 'none') return;
    overlay.classList.add('is-hiding');
    setTimeout(() => {
      overlay.style.display = 'none';
      overlay.classList.remove('is-hiding');
    }, 220);
  },

  _stopDeepLinkGuard() {
    if (this._bootDeepLinkTimer) {
      clearTimeout(this._bootDeepLinkTimer);
      this._bootDeepLinkTimer = null;
    }
    if (this._bootDeepLinkPoller) {
      clearInterval(this._bootDeepLinkPoller);
      this._bootDeepLinkPoller = null;
    }
  },

  _completeDeepLinkSuccess() {
    this._stopDeepLinkGuard();
    this._clearPendingDeepLink();
    this._clearDeepLinkQueryParams();
    // 延後隱藏覆蓋層：等目標頁面實際可見，避免閃現首頁
    const _findTargetPage = () => document.getElementById('page-activity-detail') || document.getElementById('page-team-detail') || document.getElementById('page-tournament-detail') || document.getElementById('page-user-card');
    const targetPage = _findTargetPage();
    if (targetPage && targetPage.style.display !== 'none' && targetPage.offsetHeight > 0) {
      this._hideDeepLinkOverlay();
    } else {
      // 頁面尚未切換完成，輪詢等待（最多 2 秒後強制隱藏）
      let _tries = 0;
      const _waitHide = setInterval(() => {
        _tries++;
        const tp = _findTargetPage();
        if ((tp && tp.style.display !== 'none' && tp.offsetHeight > 0) || _tries >= 20) {
          clearInterval(_waitHide);
          this._hideDeepLinkOverlay();
        }
      }, 100);
    }
    this._bootDeepLink = null;
    this._deepLinkAuthRedirecting = false;
    this._pendingDeepLinkOpenKey = '';
    this._pendingDeepLinkOpenPromise = null;
  },

  _completeDeepLinkFallback(message, targetPage = 'page-activities') {
    this._stopDeepLinkGuard();
    this._clearPendingDeepLink();
    this._clearDeepLinkQueryParams();
    this._hideDeepLinkOverlay();
    this._bootDeepLink = null;
    this._deepLinkAuthRedirecting = false;
    this._pendingDeepLinkOpenKey = '';
    this._pendingDeepLinkOpenPromise = null;
    const canOpenProtected = (typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn());
    const fallbackPage = (!canOpenProtected && targetPage !== 'page-home') ? 'page-home' : targetPage;
    // 2026-04-19 fix: 若用戶在 deep-link poller timeout 前已主動導航到其他頁面（例如
    // 點擊行事曆活動進入詳情頁），不再強制切到 fallbackPage，避免把用戶從正在瀏覽的
    // 頁面拉走。用戶回報「剛開啟網站快速點活動進詳情頁，幾秒後被拉回行事曆」即此根因。
    const isUserOnActivePage = this.currentPage
      && this.currentPage !== 'page-home'
      && this.currentPage !== fallbackPage;
    if (isUserOnActivePage) {
      console.log('[DeepLink] user navigated to', this.currentPage, '— skipping fallback to', fallbackPage);
      if (message) this.showToast(message);
      return;
    }
    if (fallbackPage && this.currentPage !== fallbackPage) this.showPage(fallbackPage);
    if (message) this.showToast(message);
  },

  _sanitizePendingAuthAction(action) {
    if (!action || typeof action !== 'object') return null;
    const type = String(action.type || '').trim();
    if (!type) return null;

    const normalizeId = (value) => String(value || '').trim();
    const normalizeName = (value) => String(value || '').trim().slice(0, 120);

    switch (type) {
      case 'showPage': {
        const pageId = normalizeId(action.pageId);
        return pageId ? { type, pageId } : null;
      }
      case 'showEventDetail':
      case 'eventSignup':
      case 'eventCancelSignup':
      case 'toggleFavoriteEvent':
      case 'goToScanForEvent': {
        const eventId = normalizeId(action.eventId || action.id);
        if (!eventId) return null;
        const sanitized = { type, eventId };
        if (normalizeId(action.returnPageId) === 'page-activity-detail') {
          sanitized.returnPageId = 'page-activity-detail';
        }
        return sanitized;
      }
      case 'showTeamDetail': {
        const teamId = normalizeId(action.teamId || action.id);
        return teamId ? { type, teamId } : null;
      }
      case 'toggleFavoriteTournament': {
        const tournId = normalizeId(action.tournId || action.id);
        return tournId ? { type, tournId } : null;
      }
      case 'showUserProfile': {
        const name = normalizeName(action.name);
        return name ? { type, name } : null;
      }
      // v8 M1：延遲登入新增的 4 種寫入類 action type
      case 'createEvent':
      case 'createTeam':
        return { type };  // 無 payload、登入後只回對應頁
      case 'joinTeam': {
        const teamId = normalizeId(action.teamId);
        if (!teamId || !/^tm_/.test(teamId)) return null;
        return { type, teamId };
      }
      case 'applyTournament': {
        const tournamentId = normalizeId(action.tournamentId);
        if (!tournamentId || !/^ct_/.test(tournamentId)) return null;
        return { type, tournamentId };
      }
      default:
        return null;
    }
  },

  _getPendingAuthAction() {
    if (this._pendingAuthAction) return this._pendingAuthAction;
    try {
      const raw = sessionStorage.getItem(this._pendingAuthActionStorageKey);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      // v8 M2：TTL 5 分鐘（LIFF redirect 正常 < 30s、5 分鐘足夠防 stale 殘留）
      if (parsed._ts && Date.now() - parsed._ts > 5 * 60 * 1000) {
        sessionStorage.removeItem(this._pendingAuthActionStorageKey);
        return null;
      }
      const sanitized = this._sanitizePendingAuthAction(parsed);
      if (!sanitized) {
        sessionStorage.removeItem(this._pendingAuthActionStorageKey);
        return null;
      }
      this._pendingAuthAction = sanitized;
      return sanitized;
    } catch (_) {
      try { sessionStorage.removeItem(this._pendingAuthActionStorageKey); } catch (_) {}
      return null;
    }
  },

  _setPendingAuthAction(action) {
    const sanitized = this._sanitizePendingAuthAction(action);
    if (!sanitized) return null;
    this._pendingAuthAction = sanitized;
    try {
      // v8 M2：payload 帶 _ts timestamp 支援 TTL 檢查
      sessionStorage.setItem(this._pendingAuthActionStorageKey, JSON.stringify({ ...sanitized, _ts: Date.now() }));
    } catch (_) {}
    return sanitized;
  },

  /**
   * 等待 events 集合載入完成（最多 5 秒）。
   * 用於 _resumePendingAuthAction，確保 ApiService.getEvent 能找到活動。
   */
  async _waitForEventsLoaded() {
    // 已有資料直接返回
    if (typeof FirebaseService !== 'undefined' && FirebaseService._cache.events.length > 0) return;
    // 等待 events 集合首次填充
    await new Promise(resolve => {
      const check = () => typeof FirebaseService !== 'undefined' && FirebaseService._cache.events.length > 0;
      if (check()) { resolve(); return; }
      const interval = setInterval(() => { if (check()) { clearInterval(interval); resolve(); } }, 150);
      setTimeout(() => { clearInterval(interval); resolve(); }, 5000);
    });
  },

  _clearPendingAuthAction() {
    this._pendingAuthAction = null;
    try {
      sessionStorage.removeItem(this._pendingAuthActionStorageKey);
    } catch (_) {}
  },

  _isAuthenticatedForProtectedAction() {
    return typeof LineAuth !== 'undefined' && LineAuth.isLoggedIn();
  },

  /**
   * v8 Blocker 1：登入狀態就緒時、檢查有無 pending action 要續跑。
   * 由 firebase-service.js 的 auth.onAuthStateChanged listener 呼叫。
   * 配合 ensureCloudReady 內部也會呼叫、雙重觸發由 _pendingAuthActionPromise guard 防 double-fire。
   */
  _onFirebaseAuthReady() {
    if (typeof LineAuth !== 'undefined'
      && LineAuth.isLoggedIn()
      && this._getPendingAuthAction()) {
      void this._resumePendingAuthAction();
    }
    if (this._isHomePageActive?.() && typeof this.renderHomeNextActivity === 'function') {
      void this.renderHomeNextActivity({ force: true, silent: true });
    }
  },

  _requestLoginForAction(action, options = {}) {
    const pending = this._setPendingAuthAction(action);
    if (!pending) return false;

    // 同步保存 deep link，讓登入回來後 deep link 系統能快速顯示頁面
    try {
      if (action.eventId) sessionStorage.setItem('_pendingDeepEvent', action.eventId);
      if (action.teamId) sessionStorage.setItem('_pendingDeepTeam', action.teamId);
    } catch (_) {}

    if (pending.returnPageId === 'page-activity-detail' && pending.eventId) {
      try {
        this._setRouteUrl?.({ pageId: 'page-activity-detail', id: pending.eventId }, { mode: 'replace' });
      } catch (_) {}
    }

    const loginCopy = String(options.toastMessage || '\u8acb\u5148\u767b\u5165 LINE \u5e33\u865f');
    const pendingCopy = String(options.pendingToastMessage || 'LINE \u767b\u5165\u8655\u7406\u4e2d...');
    const startLogin = () => {
      if (typeof LineAuth === 'undefined' || typeof LineAuth.login !== 'function') {
        this.showToast('LINE \u767b\u5165\u5c1a\u672a\u6e96\u5099\u5b8c\u6210');
        return false;
      }
      if (typeof LineAuth.isPendingLogin === 'function' && LineAuth.isPendingLogin()) {
        this.showToast(pendingCopy);
        return true;
      }
      this.showToast(loginCopy);
      LineAuth.login();
      return true;
    };

    if (typeof LineAuth !== 'undefined' && LineAuth._ready) {
      try {
        return startLogin();
      } catch (err) {
        console.warn('[AuthAction] login redirect failed:', err);
        this.showToast('LINE \u767b\u5165\u555f\u52d5\u5931\u6557\uff0c\u8acb\u7a0d\u5f8c\u518d\u8a66');
        return true;
      }
    }

    if (typeof this.ensureCloudReady === 'function') {
      this.showToast('\u6b63\u5728\u6e96\u5099 LINE \u767b\u5165...');
      void this.ensureCloudReady({ reason: 'pending-auth-action' })
        .then(() => {
          if (this._isAuthenticatedForProtectedAction()) return;
          try {
            startLogin();
          } catch (err) {
            console.warn('[AuthAction] deferred login redirect failed:', err);
          }
        })
        .catch(err => {
          console.warn('[AuthAction] ensureCloudReady before login failed:', err);
          this.showToast('LINE \u767b\u5165\u5c1a\u672a\u6e96\u5099\u5b8c\u6210');
        });
      return true;
    }

    this.showToast('LINE \u767b\u5165\u5c1a\u672a\u6e96\u5099\u5b8c\u6210');
    return true;
  },

  async _resumePendingAuthAction() {
    if (this._pendingAuthActionPromise) {
      return await this._pendingAuthActionPromise;
    }
    if (!this._isAuthenticatedForProtectedAction()) return false;

    const action = this._getPendingAuthAction();
    if (!action) return false;

    // 若有 deep link poller 正在運作，先停止以避免兩者同時呼叫 showEventDetail 造成 requestSeq 衝突
    if (action.eventId && this._bootDeepLinkPoller) {
      this._deepLinkRendered = true;
      this._stopDeepLinkGuard();
      this._clearPendingDeepLink();
      this._hideDeepLinkOverlay();
    }

    const actionPromise = (async () => {
      try {
        // 若涉及活動頁面，先確保 events 集合已載入
        const needsEvents = ['showEventDetail', 'eventSignup', 'eventCancelSignup', 'toggleFavoriteEvent'].includes(action.type);
        if (needsEvents && action.eventId) {
          await this._waitForEventsLoaded();
        }
        const eventDetailResumeOptions = action.returnPageId === 'page-activity-detail'
          ? { bypassPageLock: true }
          : undefined;

        switch (action.type) {
          case 'showPage':
            await this.showPage(action.pageId, { resetHistory: true });
            return true;
          case 'showEventDetail':
            await this.showEventDetail(action.eventId, eventDetailResumeOptions);
            return true;
          case 'eventSignup':
            await this.showEventDetail(action.eventId, eventDetailResumeOptions);
            await this.handleSignup?.(action.eventId);
            return true;
          case 'eventCancelSignup':
            await this.showEventDetail(action.eventId, eventDetailResumeOptions);
            await this.handleCancelSignup?.(action.eventId);
            return true;
          case 'toggleFavoriteEvent':
            await this.showEventDetail(action.eventId, eventDetailResumeOptions);
            this.toggleFavoriteEvent?.(action.eventId);
            return true;
          case 'goToScanForEvent':
            this.goToScanForEvent?.(action.eventId);
            return true;
          case 'showTeamDetail':
            await this.showTeamDetail(action.teamId);
            return true;
          case 'toggleFavoriteTournament':
            this.toggleFavoriteTournament?.(action.tournId);
            return true;
          case 'showUserProfile':
            this.showUserProfile?.(action.name);
            return true;
          // v8 M1：延遲登入新增的 4 種寫入 action type
          case 'createEvent':
            if (typeof this.openHomeCreateEvent === 'function') {
              await this.openHomeCreateEvent({ resetHistory: true, skipLoginRequest: true });
              return true;
            }
            // 只回活動頁、不自動開 modal（避免用戶填一半表單遺失）
            await this.showPage?.('page-activities', { resetHistory: true, disableShellFirst: true });
            if (typeof ScriptLoader !== 'undefined' && ScriptLoader.ensureForPage) {
              await ScriptLoader.ensureForPage('page-activities');
            }
            if (typeof this.openCreateEventModal === 'function') {
              await this.openCreateEventModal();
              return true;
            }
            this.showToast?.('登入成功、請再點一次「我要開團」');
            return true;
          case 'createTeam':
            await this.showPage?.('page-teams', { resetHistory: true });
            this.showToast?.('登入成功、請再點一次建立俱樂部');
            return true;
          case 'joinTeam':
            if (action.teamId) {
              await this.showTeamDetail?.(action.teamId);
              await this.handleJoinTeam?.(action.teamId);
            }
            return true;
          case 'applyTournament':
            if (action.tournamentId) {
              await this.showTournamentDetail?.(action.tournamentId);
              // QA B2 修復：與 joinTeam 一致、登入後自動續跑申請（不讓用戶再按一次）
              await this.registerTournament?.(action.tournamentId);
            }
            return true;
          default:
            return false;
        }
      } catch (err) {
        console.warn('[AuthAction] resume failed:', err);
        return false;
      } finally {
        this._clearPendingAuthAction();
      }
    })();

    this._pendingAuthActionPromise = actionPromise.finally(() => {
      if (this._pendingAuthActionPromise === actionPromise) {
        this._pendingAuthActionPromise = null;
      }
      this._maybeRunDeferredSwReload?.('auth-complete');
    });

    return await this._pendingAuthActionPromise;
  },

  _tryStartDeepLinkLogin() {
    if (this._deepLinkAuthRedirecting) return true;
    if (typeof LineAuth === 'undefined') return false;
    if (typeof LineAuth.isLoggedIn === 'function' && LineAuth.isLoggedIn()) return false;

    // LIFF session exists but profile is still loading.
    if (typeof LineAuth.isPendingLogin === 'function' && LineAuth.isPendingLogin()) {
      this._deepLinkAuthRedirecting = true;
      return true;
    }

    // LIFF session exists but getProfile() failed — re-login won't help, avoid infinite redirect loop.
    if (LineAuth.hasLiffSession && LineAuth.hasLiffSession() && LineAuth._profileError) {
      console.warn('[DeepLink] LIFF session exists but getProfile failed, skipping login redirect');
      return false;
    }

    // Wait until SDK is ready (Phase 4) before triggering login.
    if (typeof liff === 'undefined' || !LineAuth._ready) {
      if (typeof this.ensureCloudReady === 'function') {
        void this.ensureCloudReady({ reason: 'deep-link-login' }).catch(() => {});
      }
      return false;
    }

    try {
      this._deepLinkAuthRedirecting = true;
      console.log('[DeepLink] unauthenticated, redirecting to LINE login');
      LineAuth.login();
      return true;
    } catch (err) {
      this._deepLinkAuthRedirecting = false;
      console.warn('[DeepLink] login redirect failed:', err);
      return false;
    }
  },

  // ── Firestore REST API 直取（不需 SDK）──

  _convertFirestoreRestValue(val) {
    if (val === undefined || val === null) return null;
    if ('stringValue' in val) return val.stringValue;
    if ('integerValue' in val) return Number(val.integerValue);
    if ('doubleValue' in val) return Number(val.doubleValue);
    if ('booleanValue' in val) return val.booleanValue;
    if ('nullValue' in val) return null;
    if ('timestampValue' in val) return val.timestampValue;
    if ('arrayValue' in val) {
      return (val.arrayValue.values || []).map(v => this._convertFirestoreRestValue(v));
    }
    if ('mapValue' in val) {
      const obj = {};
      const fields = val.mapValue.fields || {};
      for (const k of Object.keys(fields)) {
        obj[k] = this._convertFirestoreRestValue(fields[k]);
      }
      return obj;
    }
    return null;
  },

  _convertFirestoreRestDoc(doc, eventId) {
    if (!doc || !doc.fields) return null;
    const result = {};
    const fields = doc.fields;
    for (const k of Object.keys(fields)) {
      result[k] = this._convertFirestoreRestValue(fields[k]);
    }
    // 從 doc.name 取得真實 Firestore 文件 ID
    const docId = doc.name ? doc.name.split('/').pop() : eventId;
    if (!result.id) result.id = eventId;
    result._docId = docId;
    return result;
  },

  async _fetchEventViaRest(eventId) {
    try {
      const pid = typeof firebaseConfig !== 'undefined' && firebaseConfig.projectId;
      const key = typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey;
      if (!pid || !key) return null;

      // 先嘗試直接以 eventId 當作 doc path 取得（可能 docId === dataId）
      const directUrl = `https://firestore.googleapis.com/v1/projects/${pid}/databases/(default)/documents/events/${encodeURIComponent(eventId)}?key=${encodeURIComponent(key)}`;
      const directResp = await fetch(directUrl);
      if (directResp.ok) {
        const doc = await directResp.json();
        if (doc && doc.fields) return this._convertFirestoreRestDoc(doc, eventId);
      }

      // 直接取得失敗（docId !== dataId），改用 structuredQuery 以 id 欄位查詢
      const queryUrl = `https://firestore.googleapis.com/v1/projects/${pid}/databases/(default)/documents:runQuery?key=${encodeURIComponent(key)}`;
      const queryResp = await fetch(queryUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          structuredQuery: {
            from: [{ collectionId: 'events' }],
            where: { fieldFilter: { field: { fieldPath: 'id' }, op: 'EQUAL', value: { stringValue: eventId } } },
            limit: 1
          }
        })
      });
      if (!queryResp.ok) return null;
      const results = await queryResp.json();
      if (Array.isArray(results) && results.length > 0 && results[0].document) {
        return this._convertFirestoreRestDoc(results[0].document, eventId);
      }
      return null;
    } catch (err) {
      console.warn('[DeepLink] REST fetch failed:', err);
      return null;
    }
  },

  async _tryInstantEventDeepLink() {
    try {
      const event = await this._deepLinkRestFetch;
      if (!event || this._deepLinkRendered) return false;

      // 確保 activity-detail HTML 已載入
      if (typeof PageLoader !== 'undefined' && PageLoader.ensurePage) {
        await PageLoader.ensurePage('page-activity-detail');
      }

      // 注入 cache（讓 ApiService.getEvent 找到）
      if (typeof FirebaseService !== 'undefined' && FirebaseService._cache && FirebaseService._cache.events) {
        if (!FirebaseService._cache.events.find(e => e.id === event.id)) {
          FirebaseService._cache.events.push(event);
        }
      }

      // 設置 instant mode（讓 showPage 跳過 ensureCloudReady）
      this._instantDeepLinkMode = true;
      try {
        const result = await this.showEventDetail(event.id, { allowGuest: true });
        if (result?.ok) {
          this._deepLinkRendered = true;
          this._instantDeepLinkEventId = event.id;
          this._completeDeepLinkSuccess();
          console.log('[DeepLink] instant preview rendered via REST API');
          return true;
        }
      } finally {
        this._instantDeepLinkMode = false;
      }
      return false;
    } catch (err) {
      console.warn('[DeepLink] instant preview failed:', err);
      this._instantDeepLinkMode = false;
      return false;
    }
  },

  // §7.10 Phase 待補：Pre-auth REST 快速預覽（俱樂部/賽事）
  async _fetchTeamViaRest(teamId) {
    try {
      var pid = typeof firebaseConfig !== 'undefined' && firebaseConfig.projectId;
      var key = typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey;
      if (!pid || !key) return null;
      // 先以 teamId 作為 doc path（ID 統一後 doc.id === data.id）
      var directUrl = 'https://firestore.googleapis.com/v1/projects/' + pid + '/databases/(default)/documents/teams/' + encodeURIComponent(teamId) + '?key=' + encodeURIComponent(key);
      var directResp = await fetch(directUrl);
      if (directResp.ok) {
        var doc = await directResp.json();
        if (doc && doc.fields) return this._convertFirestoreRestDoc(doc, teamId);
      }
      // fallback：where 查詢（舊資料 doc.id ≠ data.id）
      var queryUrl = 'https://firestore.googleapis.com/v1/projects/' + pid + '/databases/(default)/documents:runQuery?key=' + encodeURIComponent(key);
      var queryResp = await fetch(queryUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ structuredQuery: { from: [{ collectionId: 'teams' }], where: { fieldFilter: { field: { fieldPath: 'id' }, op: 'EQUAL', value: { stringValue: teamId } } }, limit: 1 } })
      });
      if (!queryResp.ok) return null;
      var results = await queryResp.json();
      if (Array.isArray(results) && results.length > 0 && results[0].document) {
        return this._convertFirestoreRestDoc(results[0].document, teamId);
      }
      return null;
    } catch (err) {
      console.warn('[DeepLink] REST team fetch failed:', err);
      return null;
    }
  },

  async _fetchTournamentViaRest(tournamentId) {
