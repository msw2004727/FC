name: Submit Sitemap to Google

on:
  push:
    branches: [main]
    paths:
      - 'sitemap.xml'
      - 'sitemap-static.xml'
      - 'sitemap-events.xml'
      - 'sitemap-teams.xml'
      - 'sitemap-tournaments.xml'
      - 'seo/**'
      - 'blog/**'
      - 'roles/**'
      - 'index.html'
      - 'privacy.html'
      - 'terms.html'

jobs:
  submit-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Submit sitemap to Google Search Console
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "GCP_SERVICE_ACCOUNT_JSON secret is missing; skipping sitemap submission."
            exit 0
          fi
          node scripts/submit-sitemap.js
