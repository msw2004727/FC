name: Build dynamic sitemaps

# 何時跑：
#   - schedule: 每天 UTC 03:17 跑一次，重建 sitemap-events / sitemap-teams / sitemap-tournaments
#   - workflow_dispatch: 允許手動觸發（首次部署 / 緊急更新）
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run sitemap generation and show file diffs without committing.'
        required: false
        default: false
        type: boolean

# 並發保護：上次還沒結束時，本次自動跳過
concurrency:
  group: build-sitemap
  cancel-in-progress: false

# 需要 commit + push 權限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build sitemap children
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: node scripts/build-sitemap.js
        continue-on-error: true   # 失敗（API quota / Firestore down）不阻塞 workflow

      - name: Report sitemap changes (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          set -e
          if git diff --quiet -- sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml; then
            echo "[sitemap-bot] dry-run: no sitemap changes"
            exit 0
          fi
          echo "[sitemap-bot] dry-run: sitemap changes detected"
          git diff --stat -- sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml
          git diff --name-only -- sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml

      - name: Commit if changed
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          set -e
          push_with_retry() {
            local bot_prefix="[sitemap-bot]"
            local max_attempts=4
            local delay_seconds=10
            local attempt=1
            local push_log
            push_log="$(mktemp)"
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "$bot_prefix push attempt ${attempt}/${max_attempts}"
              if git push origin HEAD:main >"$push_log" 2>&1; then
                cat "$push_log"
                rm -f "$push_log"
                return 0
              fi
              cat "$push_log"
              if ! grep -Eqi "Internal Server Error|HTTP 5[0-9][0-9]|remote end hung up|The remote end hung up unexpectedly|Connection timed out|Operation timed out|Could not resolve host|RPC failed" "$push_log"; then
                rm -f "$push_log"
                return 1
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "$bot_prefix GitHub remote returned a transient error after ${max_attempts} attempts; skipping this best-effort update."
                rm -f "$push_log"
                return 2
              fi
              sleep "$delay_seconds"
              delay_seconds=$((delay_seconds * 2))
              git pull --rebase origin main || {
                rm -f "$push_log"
                return 1
              }
              attempt=$((attempt + 1))
            done
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 把目標檔案加入 staging（包含尚未追蹤的新檔），再用 git diff --cached 判斷有無實質變更
          git add sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml
          if git diff --cached --quiet -- sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml; then
            echo "[sitemap-bot] 三個 sitemap 內容未變、跳過 commit"
            exit 0
          fi
          git commit -m "chore(seo): 自動重建 dynamic sitemap (UTC $(date -u +%Y-%m-%dT%H:%M)) [skip ci]"
          git pull --rebase origin main || (echo "[sitemap-bot] rebase 失敗、放棄本次 commit"; exit 1)
          push_status=0
          push_with_retry || push_status=$?
          if [ "$push_status" -eq 2 ]; then
            exit 0
          elif [ "$push_status" -ne 0 ]; then
            exit "$push_status"
          fi
          echo "[sitemap-bot] 已 push"
