name: Build dynamic sitemaps

# 何時跑：
#   - schedule: 每天 UTC 03:17 跑一次，重建 sitemap-events / sitemap-teams / sitemap-tournaments
#   - workflow_dispatch: 允許手動觸發（首次部署 / 緊急更新）
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

# 並發保護：上次還沒結束時，本次自動跳過
concurrency:
  group: build-sitemap
  cancel-in-progress: false

# 需要 commit + push 權限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build sitemap children
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: node scripts/build-sitemap.js
        continue-on-error: true   # 失敗（API quota / Firestore down）不阻塞 workflow

      - name: Commit if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 把目標檔案加入 staging（包含尚未追蹤的新檔），再用 git diff --cached 判斷有無實質變更
          git add sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml
          if git diff --cached --quiet -- sitemap-events.xml sitemap-teams.xml sitemap-tournaments.xml; then
            echo "[sitemap-bot] 三個 sitemap 內容未變、跳過 commit"
            exit 0
          fi
          git commit -m "chore(seo): 自動重建 dynamic sitemap (UTC $(date -u +%Y-%m-%dT%H:%M)) [skip ci]"
          git pull --rebase origin main || (echo "[sitemap-bot] rebase 失敗、放棄本次 commit"; exit 1)
          git push origin HEAD:main
          echo "[sitemap-bot] 已 push"
