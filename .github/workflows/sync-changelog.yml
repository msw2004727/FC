name: Sync Changelog to Firestore

on:
  push:
    branches: [main]

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for git history lookup.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Sync current month changelog to Firestore
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "GCP_SERVICE_ACCOUNT_JSON secret is missing; skipping changelog sync."
            exit 0
          fi
          CURRENT_MONTH=$(date -u +%Y-%m)
          echo "Sync changelog month: $CURRENT_MONTH"
          node scripts/sync-changelog.js "$CURRENT_MONTH"
