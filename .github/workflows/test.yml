name: Test Suite

on:
  push:
    branches: [main]
    # 2026-04-27 F 方案：inject-hot-events.yml 每 3 小時自動 commit 只改 index.html
    # 這種「純 inline 資料更新」commit 不需要重跑測試（單元/規則測試不依賴 index.html 內容）
    # 用 paths-ignore 過濾、節省 CI 配額（每月省約 700-1300 分鐘 GitHub Actions 用量）
    paths-ignore:
      - 'index.html'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  firestore-rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules
