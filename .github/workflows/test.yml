name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:unit:coverage -- --coverageReporters=text-summary --coverageReporters=json-summary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: warn

  firestore-rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules

  e2e-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: |
          node tests/e2e/static-server.cjs 3000 &
          sleep 2
          BASE_URL=http://127.0.0.1:3000 npm run test:e2e:smoke -- --workers=1
