name: Inject Home Summary to index.html

# 何時跑：
#   - schedule: 每 6 小時整點（UTC）跑一次、把 Firestore 首頁摘要 inline 到 index.html
#   - workflow_dispatch: 允許手動觸發（首次部署 / debug / 緊急更新）
on:
  schedule:
    - cron: '17 * * * *'    # hourly, offset to avoid top-of-hour queueing
  workflow_dispatch:

# 並發保護：上次還沒結束時，本次自動跳過（避免 push 競爭）
concurrency:
  group: inject-home-summary
  cancel-in-progress: false

# 需要 commit + push 權限
permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # fetch 全部 history 以利後續 pull --rebase
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject home summary
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: node scripts/inject-hot-events.js
        continue-on-error: true   # 失敗（API quota / Firestore down）不阻塞 workflow

      - name: Commit if changed
        run: |
          set -e
          push_with_retry() {
            local bot_prefix="[inject-bot]"
            local max_attempts=4
            local delay_seconds=10
            local attempt=1
            local push_log
            push_log="$(mktemp)"
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "$bot_prefix push attempt ${attempt}/${max_attempts}"
              if git push origin HEAD:main >"$push_log" 2>&1; then
                cat "$push_log"
                rm -f "$push_log"
                return 0
              fi
              cat "$push_log"
              if ! grep -Eqi "Internal Server Error|HTTP 5[0-9][0-9]|remote end hung up|The remote end hung up unexpectedly|Connection timed out|Operation timed out|Could not resolve host|RPC failed" "$push_log"; then
                rm -f "$push_log"
                return 1
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "$bot_prefix GitHub remote returned a transient error after ${max_attempts} attempts; skipping this best-effort update."
                rm -f "$push_log"
                return 2
              fi
              sleep "$delay_seconds"
              delay_seconds=$((delay_seconds * 2))
              git pull --rebase origin main || {
                rm -f "$push_log"
                return 1
              }
              attempt=$((attempt + 1))
            done
          }

          if git diff --quiet index.html; then
            echo "[inject-bot] index.html 內容未變、跳過 commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # commit message 含 [skip ci] tag、防 test.yml 等被觸發（雙保險：
          # test.yml 也用 paths-ignore: index.html 過濾）
          git commit -m "chore(perf): 自動 inline 首頁摘要 (UTC $(date -u +%Y-%m-%dT%H:%M)) [skip ci]"
          # 推前先 rebase，處理可能的並發 push（極少見，但安全）
          git pull --rebase origin main || (echo "[inject-bot] rebase 失敗、放棄本次 commit"; exit 1)
          push_status=0
          push_with_retry || push_status=$?
          if [ "$push_status" -eq 2 ]; then
            exit 0
          elif [ "$push_status" -ne 0 ]; then
            exit "$push_status"
          fi
          echo "[inject-bot] 已 push"
