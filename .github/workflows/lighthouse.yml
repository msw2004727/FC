name: Lighthouse CI

# 何時跑：
# - 手動觸發（隨時想檢查）
# - 每週一早上 02:00 UTC（台北時間 10:00）自動跑，追蹤長期趨勢
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse on key pages
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://toosterx.com/
            https://toosterx.com/seo/football
            https://toosterx.com/seo/basketball
            https://toosterx.com/seo/pickleball
            https://toosterx.com/seo/dodgeball
            https://toosterx.com/seo/running
            https://toosterx.com/seo/hiking
            https://toosterx.com/seo/football-taichung
            https://toosterx.com/seo/taichung-football-community
            https://toosterx.com/seo/nantun-football-park
            https://toosterx.com/seo/sports-changhua
            https://toosterx.com/seo/sports-nantou
            https://toosterx.com/blog/
            https://toosterx.com/blog/football-shoes-guide
            https://toosterx.com/blog/basketball-rules
            https://toosterx.com/roles/
          uploadArtifacts: true
          temporaryPublicStorage: true
          # 不設 assertions，只收集報告（先觀察基準再訂閾值）
          runs: 1
