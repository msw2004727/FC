name: Verify GSC Read Permission

# Manual check for whether the service account can read Google Search Console data.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Verify GSC read permissions
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "GCP_SERVICE_ACCOUNT_JSON secret is missing."
            exit 1
          fi
          node scripts/verify-gsc-read.js
