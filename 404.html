<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到頁面 | ToosterX</title>
  <meta name="description" content="找不到指定頁面。你可以回到 ToosterX 首頁，或前往活動列表尋找最新運動揪團。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/icons/icon-192x192.png" type="image/png">
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid #d9e2ef;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #3568d4;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.75rem, 2vw, 2.25rem);
      line-height: 1.25;
    }

    p {
      margin: 0 0 16px;
      color: #526174;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 8px;
      color: #ffffff;
      background: #1d5fd1;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      color: #172033;
      background: #e9eef7;
    }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;
      var query = window.location.search || "";
      var hash = window.location.hash || "";
      var safeSegment = "[A-Za-z0-9_-]{3,80}";
      var cleanPathPatterns = [
        /^\/activities\/?$/,
        /^\/teams\/?$/,
        /^\/tournaments\/?$/,
        /^\/profile\/?$/,
        new RegExp("^/events/" + safeSegment + "/?$"),
        new RegExp("^/teams/" + safeSegment + "/?$"),
        new RegExp("^/teams/" + safeSegment + "/courses/" + safeSegment + "/lessons/" + safeSegment + "/?$"),
        new RegExp("^/tournaments/" + safeSegment + "/?$")
      ];

      var shouldRedirect = cleanPathPatterns.some(function (pattern) {
        return pattern.test(path);
      });

      if (shouldRedirect) {
        var redirectTarget = "/?_spa_redirect=" + encodeURIComponent(path + query + hash);
        window.location.replace(redirectTarget);
      }
    }());
  </script>
</head>
<body>
  <main>
    <p class="eyebrow">404</p>
    <h1>找不到這個頁面</h1>
    <p>這個連結可能已移動、過期，或目前無法公開瀏覽。</p>
    <p>你可以回到首頁，或直接查看最新活動。</p>
    <div class="actions" aria-label="頁面導覽">
      <a href="/">回到首頁</a>
      <a class="secondary" href="/activities">查看活動</a>
    </div>
  </main>
</body>
</html>
